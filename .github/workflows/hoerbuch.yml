name: Hörbuch erstellen

on:
  workflow_dispatch:
    inputs:
      quellsprache:
        description: "Quellsprache (de oder en)"
        required: true
        default: "de"
        type: choice
        options:
          - de
          - en

jobs:
  test_satzweise:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Systempakete installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg wget

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python-Pakete installieren
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir ebooklib beautifulsoup4 pymupdf lxml

      - name: Testausschnitt extrahieren
        shell: bash
        run: |
          cat > script_testausschnitt.py <<'PY'
          import re
          import glob
          from pathlib import Path
          files = [Path(p) for p in glob.glob("text/buch.*") if not p.endswith(".gitkeep")]
          if not files:
              raise SystemExit("Fehler: Keine Datei text/buch.* gefunden.")
          pfad = files[0]
          endung = pfad.suffix.lower()
          def clean_text(t: str) -> str:
              t = t.replace("\r\n", "\n").replace("\r", "\n")
              t = t.replace("\u00ad", "")
              t = re.sub(r"[ \t]+", " ", t)
              t = re.sub(r"\n{3,}", "\n\n", t)
              t = re.sub(r"(?<![.!?:;,])\n(?!\n)", " ", t)
              t = re.sub(r" +", " ", t)
              t = re.sub(r" ?([,;:.!?])", r"\1", t)
              t = re.sub(r"([,;:.!?])([^\s\"'»)\]])", r"\1 \2", t)
              t = re.sub(r"\s+\n", "\n", t)
              t = re.sub(r"\n\s+", "\n", t)
              t = re.sub(r"\n{2,}", "\n\n", t)
              return t.strip()
          if endung == ".txt":
              for enc in ("utf-8", "utf-8-sig", "cp1252", "latin-1"):
                  try:
                      text = pfad.read_text(encoding=enc)
                      break
                  except Exception:
                      continue
          elif endung == ".epub":
              from ebooklib import epub
              import ebooklib
              from bs4 import BeautifulSoup
              book = epub.read_epub(str(pfad))
              teile = []
              for item in book.get_items():
                  if item.get_type() == ebooklib.ITEM_DOCUMENT:
                      soup = BeautifulSoup(item.get_content(), "html.parser")
                      tx = soup.get_text("\n")
                      if tx and tx.strip():
                          teile.append(tx.strip())
              text = "\n\n".join(teile)
          elif endung == ".pdf":
              import fitz
              teile = []
              with fitz.open(str(pfad)) as doc:
                  for seite in doc:
                      tx = seite.get_text()
                      if tx and tx.strip():
                          teile.append(tx.strip())
              text = "\n\n".join(teile)
          else:
              raise SystemExit(f"Fehler: Nicht unterstuetzte Dateiendung: {endung}")
          text = clean_text(text)
          ausschnitt = text[:3000]
          Path("test_ausschnitt.txt").write_text(ausschnitt, encoding="utf-8")
          saetze = re.split(r"(?<=[.!?])\s+", ausschnitt)
          saetze = [s.strip() for s in saetze if s.strip()]
          Path("test_saetze.txt").write_text("\n".join(saetze), encoding="utf-8")
          print(f"Anzahl Saetze: {len(saetze)}")
          PY
          python3 script_testausschnitt.py

      - name: Piper installieren
        run: |
          wget -q https://github.com/rhasspy/piper/releases/download/2023.11.14-2/piper_linux_x86_64.tar.gz
          tar xzf piper_linux_x86_64.tar.gz

      - name: Thorsten-High-Stimme herunterladen
        run: |
          mkdir -p voices
          wget -q -O voices/de_DE-thorsten-high.onnx \
            https://huggingface.co/rhasspy/piper-voices/resolve/main/de/de_DE/thorsten/high/de_DE-thorsten-high.onnx
          wget -q -O voices/de_DE-thorsten-high.onnx.json \
            https://huggingface.co/rhasspy/piper-voices/resolve/main/de/de_DE/thorsten/high/de_DE-thorsten-high.onnx.json

      - name: Variante A - Block auf einmal
        shell: bash
        run: |
          mkdir -p test_audio
          ./piper/piper \
            --model voices/de_DE-thorsten-high.onnx \
            --length_scale 1.35 \
            --noise_scale 0.667 \
            --noise_w 0.6 \
            --sentence_silence 0.4 \
            --output_file test_audio/variante_a_block.wav < test_ausschnitt.txt
          ffmpeg -y -i test_audio/variante_a_block.wav -codec:a libmp3lame -qscale:a 2 test_audio/variante_a_block.mp3

      - name: Variante B - satzweise einzeln
        shell: bash
        run: |
          mkdir -p test_audio/satzweise
          i=1
          while IFS= read -r zeile; do
            [ -z "$zeile" ] && continue
            nr=$(printf "%03d" "$i")
            echo "$zeile" | ./piper/piper \
              --model voices/de_DE-thorsten-high.onnx \
              --length_scale 1.35 \
              --noise_scale 0.667 \
              --noise_w 0.6 \
              --sentence_silence 0.4 \
              --output_file "test_audio/satzweise/satz_${nr}.wav"
            i=$((i+1))
          done < test_saetze.txt
          ls test_audio/satzweise/*.wav | sort > test_audio/liste.txt
          BASE="$(pwd)"
          awk -v base="$BASE" '{print "file '\''" base "/" $0 "'\''"}' test_audio/liste.txt > test_audio/concat.txt
          ffmpeg -y -f concat -safe 0 -i test_audio/concat.txt -c:a pcm_s16le test_audio/variante_b_satzweise.wav
          ffmpeg -y -i test_audio/variante_b_satzweise.wav -codec:a libmp3lame -qscale:a 2 test_audio/variante_b_satzweise.mp3

      - name: Testdateien als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: test-ergebnis-satzweise-vs-block
          path: |
            test_audio/variante_a_block.mp3
            test_audio/variante_b_satzweise.mp3
            test_ausschnitt.txt
          retention-days: 3

      - name: Test-Release veröffentlichen
        uses: softprops/action-gh-release@v2
        with:
          tag_name: test-piper-${{ github.run_id }}
          name: Test Piper ${{ github.run_id }}
          files: |
            test_audio/variante_a_block.mp3
            test_audio/variante_b_satzweise.mp3
          body: |
            Testergebnis satzweise vs Block

      - name: E-Mail mit Download-Link senden
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_PASSWORD }}
          subject: Piper-Test fertig - Run ${{ github.run_id }}
          to: ${{ secrets.RECIPIENT_EMAIL }}
          from: Hörbuch-Bot
          body: |
            Der Piper-Test ist fertig.
            Download:
            https://github.com/Melvin-Udall/H-rb-cher/releases/tag/test-piper-${{ github.run_id }}
            Enthalten sind zwei kurze Testdateien:
            - variante_a_block.mp3 (aktueller Ansatz)
            - variante_b_satzweise.mp3 (Testansatz satzweise)
