name: Hörbuch erstellen

on:
  workflow_dispatch:
    inputs:
      quellsprache:
        description: 'Quellsprache (de oder en)'
        required: true
        default: 'de'
        type: choice
        options:
          - de
          - en

permissions:
  contents: write

jobs:
  build-audiobook:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Systempakete installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg wget

      - name: Python-Pakete installieren
        run: |
          python -m pip install --upgrade pip
          pip install ebooklib beautifulsoup4 pymupdf transformers sentencepiece torch --quiet

      - name: Piper installieren
        run: |
          wget -O piper_linux_x86_64.tar.gz https://github.com/rhasspy/piper/releases/download/2023.11.14-2/piper_linux_x86_64.tar.gz
          tar xzf piper_linux_x86_64.tar.gz

      - name: Thorsten-High-Stimme herunterladen
        run: |
          mkdir -p voices
          wget -O voices/de_DE-thorsten-high.onnx https://huggingface.co/rhasspy/piper-voices/resolve/main/de/de_DE/thorsten/high/de_DE-thorsten-high.onnx
          wget -O voices/de_DE-thorsten-high.onnx.json https://huggingface.co/rhasspy/piper-voices/resolve/main/de/de_DE/thorsten/high/de_DE-thorsten-high.onnx.json

      - name: Text extrahieren, übersetzen, glätten und splitten
        run: |
          python3 - <<'PY'
          import os, re, glob, math

          quellsprache = '${{ github.event.inputs.quellsprache }}'
          dateien = [d for d in glob.glob('text/buch.*') if not d.endswith('.gitkeep')]
          if not dateien:
              raise SystemExit('Keine Buchdatei in text/ gefunden')

          pfad = dateien[0]
          endung = pfad.rsplit('.', 1)[-1].lower()
          text = ''

          if endung == 'txt':
              with open(pfad, encoding='utf-8') as f:
                  text = f.read()
          elif endung == 'epub':
              from ebooklib import epub
              import ebooklib
              from bs4 import BeautifulSoup
              book = epub.read_epub(pfad)
              teile = []
              for item in book.get_items():
                  if item.get_type() == ebooklib.ITEM_DOCUMENT:
                      soup = BeautifulSoup(item.get_content(), 'html.parser')
                      teile.append(soup.get_text(" ", strip=True))
              text = '
'.join(teile)
          elif endung == 'pdf':
              import fitz
              doc = fitz.open(pfad)
              teile = [seite.get_text() for seite in doc]
              text = '
'.join(teile)
          else:
              raise SystemExit(f'Unbekanntes Dateiformat: {endung}')

          text = re.sub(r'
', '
', text)
          text = re.sub(r'(?<![.!?:])
(?!
)', ' ', text)
          text = re.sub(r'
{2,}', '

', text)
          text = re.sub(r'[ \t]+', ' ', text).strip()

          if not text:
              raise SystemExit('Die Datei enthält keinen lesbaren Text')

          if quellsprache == 'en':
              from transformers import MarianMTModel, MarianTokenizer
              modellname = 'Helsinki-NLP/opus-mt-en-de'
              tok = MarianTokenizer.from_pretrained(modellname)
              modell = MarianMTModel.from_pretrained(modellname)
              saetze = [s.strip() for s in re.split(r'(?<=[.!?])s+', text) if s.strip()]
              uebersetzt = []
              for i in range(0, len(saetze), 16):
                  block = saetze[i:i+16]
                  if not block:
                      continue
                  eingabe = tok(block, return_tensors='pt', padding=True, truncation=True, max_length=400)
                  ausgabe = modell.generate(**eingabe, max_length=400)
                  uebersetzt.extend(tok.decode(o, skip_special_tokens=True) for o in ausgabe)
              text = ' '.join(uebersetzt)
              text = re.sub(r's+', ' ', text).strip()

          os.makedirs('text', exist_ok=True)
          with open('text/buch_glatt.txt', 'w', encoding='utf-8') as f:
              f.write(text)

          saetze = [s.strip() for s in re.split(r'(?<=[.!?])s+', text) if s.strip()]
          if not saetze:
              saetze = [text]

          total_chars = len(text)
          ziel_chunk_groesse = 12000
          max_chunks = 12
          chunk_count = max(1, min(max_chunks, math.ceil(total_chars / ziel_chunk_groesse)))
          ziel_pro_chunk = math.ceil(total_chars / chunk_count)

          chunks = []
          aktuell = []
          aktuelle_len = 0

          for satz in saetze:
              satz_len = len(satz) + 1
              if aktuell and aktuelle_len + satz_len > ziel_pro_chunk and len(chunks) < chunk_count - 1:
                  chunks.append(' '.join(aktuell).strip())
                  aktuell = []
                  aktuelle_len = 0
              aktuell.append(satz)
              aktuelle_len += satz_len

          if aktuell:
              chunks.append(' '.join(aktuell).strip())

          chunks = [c for c in chunks if c.strip()]
          if not chunks:
              raise SystemExit('Chunk-Erstellung fehlgeschlagen')

          with open('chunk_count.txt', 'w', encoding='utf-8') as f:
              f.write(str(len(chunks)))

          for i, chunk in enumerate(chunks, 1):
              with open(f'text/chunk_{i:02d}.txt', 'w', encoding='utf-8') as f:
                  f.write(chunk)
          PY

      - name: Sprachsynthese mit Piper
        run: |
          mkdir -p chunks_wav
          count=$(cat chunk_count.txt)
          for i in $(seq 1 "$count"); do
            n=$(printf "%02d" "$i")
            ./piper/piper \
              --model voices/de_DE-thorsten-high.onnx \
              --output_file "chunks_wav/chunk_${n}.wav" < "text/chunk_${n}.txt"
          done

      - name: WAVs zusammenführen und MP3 erzeugen
        run: |
          find chunks_wav -name 'chunk_*.wav' | sort > wav_list.txt
          awk '{print "file '" $0 "'"}' wav_list.txt > concat_list.txt
          ffmpeg -f concat -safe 0 -i concat_list.txt -c copy ausgabe.wav
          ffmpeg -i ausgabe.wav -codec:a libmp3lame -qscale:a 2 hoerbuch.mp3

      - name: MP3 als Release veröffentlichen
        uses: softprops/action-gh-release@v2
        with:
          tag_name: hoerbuch-${{ github.run_id }}
          files: hoerbuch.mp3
          body: Automatisch erstelltes Hörbuch

      - name: E-Mail mit Download-Link senden
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_PASSWORD }}
          subject: Dein fertiges Hörbuch
          to: ${{ secrets.RECIPIENT_EMAIL }}
          from: Hörbuch-Bot
          body: Dein Hörbuch ist fertig. Download hier: https://github.com/${{ github.repository }}/releases/tag/hoerbuch-${{ github.run_id }}
