name: Hörbuch erstellen

on:
  workflow_dispatch:
    inputs:
      quellsprache:
        description: "Quellsprache (de oder en)"
        required: true
        default: "de"
        type: choice
        options:
          - de
          - en
      text_ueberarbeiten:
        description: "Text vor Vertonung mit Gemini sprachlich glätten"
        required: true
        default: "ja"
        type: choice
        options:
          - ja
          - nein

jobs:
  textaufbereitung:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    outputs:
      matrix: ${{ steps.prep.outputs.matrix }}
      anzahl_teile: ${{ steps.prep.outputs.anzahl_teile }}
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python-Pakete installieren
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir \
            ebooklib \
            beautifulsoup4 \
            pymupdf \
            pdfplumber \
            lxml \
            transformers \
            sentencepiece \
            sacremoses \
            torch \
            google-generativeai

      - name: Text extrahieren und vorbereiten
        shell: bash
        run: |
          cat > script_extract.py <<'PY'
          import re
          import glob
          from pathlib import Path

          QUELLSPRACHE = "${{ github.event.inputs.quellsprache }}".strip().lower()
          TEXT_DIR = Path("text")
          TEXT_DIR.mkdir(parents=True, exist_ok=True)

          files = [Path(p) for p in glob.glob("text/buch.*") if not p.endswith(".gitkeep")]
          if not files:
              raise SystemExit("Fehler: Keine Datei text/buch.* gefunden.")
          if len(files) > 1:
              raise SystemExit("Fehler: Mehr als eine Datei text/buch.* gefunden. Bitte nur eine Buchdatei im Ordner text lassen.")

          pfad = files[0]
          endung = pfad.suffix.lower()

          def clean_text(t: str) -> str:
              t = t.replace("\r\n", "\n").replace("\r", "\n")
              t = t.replace("\u00ad", "")
              t = re.sub(r"[ \t]+", " ", t)
              t = re.sub(r"\n{3,}", "\n\n", t)
              t = re.sub(r"(?<![.!?:;,])\n(?!\n)", " ", t)
              t = re.sub(r" +", " ", t)
              t = re.sub(r" ?([,;:.!?])", r"\1", t)
              t = re.sub(r"([,;:.!?])([^\s\"'»)\\]])", r"\1 \2", t)
              t = re.sub(r"\s+\n", "\n", t)
              t = re.sub(r"\n\s+", "\n", t)
              t = re.sub(r"\n{2,}", "\n\n", t)
              return t.strip()

          def read_txt(path: Path) -> str:
              for enc in ("utf-8", "utf-8-sig", "cp1252", "latin-1"):
                  try:
                      return path.read_text(encoding=enc)
                  except Exception:
                      pass
              raise SystemExit("Fehler: TXT-Datei konnte nicht gelesen werden.")

          def read_epub(path: Path) -> str:
              from ebooklib import epub
              import ebooklib
              from bs4 import BeautifulSoup
              book = epub.read_epub(str(path))
              teile = []
              for item in book.get_items():
                  if item.get_type() == ebooklib.ITEM_DOCUMENT:
                      soup = BeautifulSoup(item.get_content(), "html.parser")
                      text = soup.get_text("\n")
                      if text and text.strip():
                          teile.append(text.strip())
              return "\n\n".join(teile)

          def read_pdf(path: Path) -> str:
              import fitz
              teile = []
              with fitz.open(str(path)) as doc:
                  for seite in doc:
                      tx = seite.get_text()
                      if tx and tx.strip():
                          teile.append(tx.strip())
              return "\n\n".join(teile)

          if endung == ".txt":
              text = read_txt(pfad)
          elif endung == ".epub":
              text = read_epub(pfad)
          elif endung == ".pdf":
              text = read_pdf(pfad)
          else:
              raise SystemExit(f"Fehler: Nicht unterstützte Dateiendung: {endung}")

          text = clean_text(text)
          if not text or len(text) < 50:
              raise SystemExit("Fehler: Zu wenig lesbarer Text extrahiert.")

          if QUELLSPRACHE == "en":
              from transformers import MarianMTModel, MarianTokenizer
              modellname = "Helsinki-NLP/opus-mt-en-de"
              tokenizer = MarianTokenizer.from_pretrained(modellname)
              model = MarianMTModel.from_pretrained(modellname)
              saetze = re.split(r'(?<=[.!?])\s+', text)
              saetze = [s.strip() for s in saetze if s.strip()]
              uebersetzt = []
              batch = []
              batch_chars = 0
              max_batch_chars = 3500

              def flush_batch(batch_list):
                  if not batch_list:
                      return []
                  inputs = tokenizer(
                      batch_list,
                      return_tensors="pt",
                      padding=True,
                      truncation=True,
                      max_length=512
                  )
                  outputs = model.generate(**inputs, max_length=512)
                  return [tokenizer.decode(o, skip_special_tokens=True) for o in outputs]

              for s in saetze:
                  if len(s) > 1800:
                      sub = re.split(r'(?<=[,;:])\s+', s)
                  else:
                      sub = [s]
                  for piece in sub:
                      piece = piece.strip()
                      if not piece:
                          continue
                      if batch and batch_chars + len(piece) > max_batch_chars:
                          uebersetzt.extend(flush_batch(batch))
                          batch = []
                          batch_chars = 0
                      batch.append(piece)
                      batch_chars += len(piece)

              if batch:
                  uebersetzt.extend(flush_batch(batch))

              text = clean_text(" ".join(uebersetzt))

          (TEXT_DIR / "buch_glatt.txt").write_text(text, encoding="utf-8")
          PY
          python3 script_extract.py

      - name: Text mit Gemini sprachlich glätten
        if: ${{ github.event.inputs.text_ueberarbeiten == 'ja' }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        shell: bash
        run: |
          cat > script_gemini_rewrite.py <<'PY'
          import os
          import re
          import time
          from pathlib import Path
          import google.generativeai as genai

          api_key = os.environ.get("GEMINI_API_KEY", "").strip()
          if not api_key:
              raise SystemExit("Fehler: GitHub-Secret GEMINI_API_KEY fehlt oder ist leer.")

          genai.configure(api_key=api_key)
          model = genai.GenerativeModel("gemini-2.5-flash")

          text_path = Path("text/buch_glatt.txt")
          text = text_path.read_text(encoding="utf-8")

          paragraphs = [p.strip() for p in re.split(r"\n{2,}", text) if p.strip()]
          chunks = []
          current = []
          current_words = 0
          target_words = 2200

          def word_count(s: str) -> int:
              return len(re.findall(r"\S+", s))

          for p in paragraphs:
              w = word_count(p)
              if current and current_words + w > target_words:
                  chunks.append("\n\n".join(current).strip())
                  current = [p]
                  current_words = w
              else:
                  current.append(p)
                  current_words += w
          if current:
              chunks.append("\n\n".join(current).strip())

          prompt_prefix = (
              "Überarbeite den folgenden deutschen Buchtext ausschließlich für Text-to-Speech.\n"
              "Regeln:\n"
              "1. Sehr lange Sätze mit mehreren Nebensätzen in kürzere, einfachere Hauptsätze aufteilen. "
              "Kein Satz darf länger als 25 Wörter sein.\n"
              "2. Doppelpunkte, die einen neuen Hauptsatz einleiten, wenn sinnvoll in Punkt plus neuen Satz umwandeln.\n"
              "3. Eingeschobene Nebensätze zwischen Gedankenstrichen auflösen oder glätten.\n"
              "4. Nur Standard-Satzzeichen verwenden: Punkt, Komma, Fragezeichen, Ausrufezeichen. "
              "Keine Gedankenstriche, Semikolons, Klammern, Auslassungspunkte oder Sonderzeichen im Fließtext.\n"
              "5. Zahlen als Ziffern beibehalten, aber niemals mehrere Satzzeichen direkt aneinanderreihen.\n"
              "6. Keine inhaltlichen Kürzungen, keine Zusammenfassung, keine Auslassungen.\n"
              "7. Bedeutung, Reihenfolge der Informationen und Absatzstruktur beibehalten.\n"
              "8. Nur den überarbeiteten Text ausgeben, keine Kommentare, keine Überschrift, keine Erklärung.\n\n"
              "TEXT:\n\n"
          )

          out_chunks = []
          report_lines = [f"Chunks gesamt: {len(chunks)}"]
          failed = []

          for idx, chunk in enumerate(chunks, start=1):
              success = False
              chunk_words = word_count(chunk)

              for attempt in range(1, 5):
                  try:
                      response = model.generate_content(
                          prompt_prefix + chunk,
                          generation_config={
                              "temperature": 0.2,
                              "max_output_tokens": 8192
                          }
                      )
                      result = (response.text or "").strip()

                      if not result:
                          raise ValueError("Leere Antwort")

                      result_words = word_count(result)

                      if result_words < int(chunk_words * 0.75):
                          raise ValueError(
                              f"Antwort zu kurz: Original {chunk_words} Wörter, Ergebnis {result_words} Wörter"
                          )

                      out_chunks.append(result)
                      report_lines.append(
                          f"Chunk {idx:03d}: OK | Original {chunk_words} Wörter | Ergebnis {result_words} Wörter"
                      )
                      success = True
                      break

                  except Exception as e:
                      if attempt < 4:
                          time.sleep(8 * attempt)
                      last_error = str(e)

              if not success:
                  out_chunks.append(chunk)
                  failed.append(idx)
                  report_lines.append(
                      f"Chunk {idx:03d}: FEHLER -> Original übernommen | {last_error}"
                  )

              time.sleep(2)

          rewritten = "\n\n".join(out_chunks).strip() + "\n"
          text_path.write_text(rewritten, encoding="utf-8")

          meta_dir = Path("output/meta")
          meta_dir.mkdir(parents=True, exist_ok=True)
          report_lines.append(f"Fehlgeschlagene Chunks: {failed}")
          (meta_dir / "glaettung_info.txt").write_text("\n".join(report_lines) + "\n", encoding="utf-8")
          PY
          python3 script_gemini_rewrite.py

      - name: Text final für Piper härten
        shell: bash
        run: |
          cat > script_harden.py <<'PY'
          import re
          from pathlib import Path

          text_path = Path("text/buch_glatt.txt")
          text = text_path.read_text(encoding="utf-8")

          def harden_text(t: str) -> str:
              t = t.replace("–", ",").replace("—", ",")
              t = t.replace("„", '"').replace("“", '"').replace("‚", "'").replace("‘", "'")
              t = t.replace("…", ".")
              t = re.sub(r"[;:]", ".", t)
              t = re.sub(r"\(([^)]*)\)", r", \1,", t)
              t = re.sub(r"[\[\]{}]", "", t)
              t = re.sub(r"[.]{2,}", ".", t)
              t = re.sub(r"[,]{2,}", ",", t)
              t = re.sub(r"\s*([.,!?])\s*([.,!?])", r"\1", t)
              t = re.sub(r"([.,!?])\1+", r"\1", t)
              t = re.sub(r"[ \t]+", " ", t)
              t = re.sub(r" ,", ",", t)
              t = re.sub(r" \.", ".", t)
              return t.strip()

          text = harden_text(text)

          absaetze = [p.strip() for p in re.split(r"\n{2,}", text) if p.strip()]
          alle_zeilen = []
          max_woerter_pro_satz = 25

          for absatz in absaetze:
              saetze = re.split(r'(?<=[.!?])\s+', absatz)
              for satz in saetze:
                  satz = satz.strip()
                  if not satz:
                      continue
                  woerter = satz.split()
                  if len(woerter) <= max_woerter_pro_satz:
                      alle_zeilen.append(satz)
                      continue
                  teile = re.split(r',\s+', satz)
                  aktuell = []
                  aktuell_woerter = 0
                  for teil in teile:
                      teil_woerter = len(teil.split())
                      if aktuell and aktuell_woerter + teil_woerter > max_woerter_pro_satz:
                          satzteil = ", ".join(aktuell).strip()
                          if satzteil and satzteil[-1] not in ".!?":
                              satzteil += "."
                          alle_zeilen.append(satzteil)
                          aktuell = [teil]
                          aktuell_woerter = teil_woerter
                      else:
                          aktuell.append(teil)
                          aktuell_woerter += teil_woerter
                  if aktuell:
                      satzteil = ", ".join(aktuell).strip()
                      if satzteil and satzteil[-1] not in ".!?":
                          satzteil += "."
                      alle_zeilen.append(satzteil)
              alle_zeilen.append("")

          text = "\n".join(alle_zeilen).strip() + "\n"
          text_path.write_text(text, encoding="utf-8")
          PY
          python3 script_harden.py

      - name: Text aufteilen
        id: prep
        shell: bash
        run: |
          cat > script_prepare.py <<'PY'
          import re
          import math
          import json
          from pathlib import Path

          OUT_DIR = Path("output")
          PARTS_DIR = OUT_DIR / "parts"
          META_DIR = OUT_DIR / "meta"
          OUT_DIR.mkdir(parents=True, exist_ok=True)
          PARTS_DIR.mkdir(parents=True, exist_ok=True)
          META_DIR.mkdir(parents=True, exist_ok=True)

          text = Path("text/buch_glatt.txt").read_text(encoding="utf-8")

          total_chars = len(text)
          words = len(re.findall(r"\S+", text))

          target_chars_per_part = 90000
          min_chars_per_part = 40000
          max_chars_per_part = 120000

          estimated_parts = max(1, math.ceil(total_chars / target_chars_per_part))
          estimated_parts = min(estimated_parts, 12)
          target_chars = max(min_chars_per_part, min(max_chars_per_part, math.ceil(total_chars / estimated_parts)))

          bloecke = [b for b in text.split("\n") ]
          gruppen = []
          aktuelle_gruppe = []
          for zeile in bloecke:
              if zeile.strip() == "":
                  if aktuelle_gruppe:
                      gruppen.append(aktuelle_gruppe)
                      aktuelle_gruppe = []
              else:
                  aktuelle_gruppe.append(zeile)
          if aktuelle_gruppe:
              gruppen.append(aktuelle_gruppe)

          parts = []
          current_lines = []

          def block_len(lines):
              return sum(len(x) + 1 for x in lines)

          for gruppe in gruppen:
              gruppe_len = block_len(gruppe)
              cur_len = block_len(current_lines)
              if current_lines and cur_len + gruppe_len > target_chars and cur_len >= min_chars_per_part:
                  parts.append(current_lines)
                  current_lines = list(gruppe) + [""]
              else:
                  current_lines.extend(gruppe)
                  current_lines.append("")

          if current_lines:
              if parts and block_len(current_lines) < min_chars_per_part:
                  parts[-1].extend(current_lines)
              else:
                  parts.append(current_lines)

          if not parts:
              parts = [bloecke]

          if len(parts) > 12:
              parts = parts[:12]

          for idx, lines in enumerate(parts, start=1):
              inhalt = "\n".join(lines).strip() + "\n"
              (PARTS_DIR / f"teil_{idx:03d}.txt").write_text(inhalt, encoding="utf-8")

          info = []
          info.append(f"Zeichen gesamt: {total_chars}")
          info.append(f"Wörter gesamt: {words}")
          info.append(f"Anzahl Teile: {len(parts)}")
          info.append(f"Ziel-Zeichen pro Teil: {target_chars}")
          for idx, lines in enumerate(parts, start=1):
              info.append(f"Teil {idx:03d}: {block_len(lines)} Zeichen")

          (META_DIR / "aufteilung.txt").write_text("\n".join(info) + "\n", encoding="utf-8")

          vorschau = []
          for idx, lines in enumerate(parts, start=1):
              teil_text = " ".join(lines)
              woerter = re.findall(r"\S+", teil_text)
              erste5 = " ".join(woerter[:5])
              letzte5 = " ".join(woerter[-5:]) if len(woerter) >= 5 else " ".join(woerter)
              vorschau.append(f"Teil {idx:03d}: [{erste5}] ... [{letzte5}]")

          (META_DIR / "textvorschau.txt").write_text("\n".join(vorschau) + "\n", encoding="utf-8")

          matrix_liste = [f"{i:03d}" for i in range(1, len(parts) + 1)]
          (META_DIR / "matrix.json").write_text(json.dumps(matrix_liste), encoding="utf-8")
          (META_DIR / "anzahl.txt").write_text(str(len(parts)), encoding="utf-8")
          PY
          python3 script_prepare.py
          echo "matrix=$(cat output/meta/matrix.json)" >> "$GITHUB_OUTPUT"
          echo "anzahl_teile=$(cat output/meta/anzahl.txt)" >> "$GITHUB_OUTPUT"

      - name: Textteile als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: text-teile
          path: |
            output/parts/
            output/meta/aufteilung.txt
            output/meta/textvorschau.txt
            output/meta/glaettung_info.txt
          retention-days: 1

  sprachsynthese:
    needs: textaufbereitung
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: true
      max-parallel: 6
      matrix:
        teil: ${{ fromJson(needs.textaufbereitung.outputs.matrix) }}
    steps:
      - name: Systempakete installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg wget

      - name: Textteile herunterladen
        uses: actions/download-artifact@v4
        with:
          name: text-teile
          path: output

      - name: Piper installieren
        run: |
          wget -q https://github.com/rhasspy/piper/releases/download/2023.11.14-2/piper_linux_x86_64.tar.gz
          tar xzf piper_linux_x86_64.tar.gz

      - name: Thorsten-High-Stimme herunterladen
        run: |
          mkdir -p voices
          wget -q -O voices/de_DE-thorsten-high.onnx \
            https://huggingface.co/rhasspy/piper-voices/resolve/main/de/de_DE/thorsten/high/de_DE-thorsten-high.onnx
          wget -q -O voices/de_DE-thorsten-high.onnx.json \
            https://huggingface.co/rhasspy/piper-voices/resolve/main/de/de_DE/thorsten/high/de_DE-thorsten-high.onnx.json

      - name: Audio-Teil erzeugen
        shell: bash
        run: |
          mkdir -p output/audio
          txt="output/parts/teil_${{ matrix.teil }}.txt"
          wav="output/audio/teil_${{ matrix.teil }}.wav"
          mp3="output/audio/teil_${{ matrix.teil }}.mp3"
          ./piper/piper \
            --model voices/de_DE-thorsten-high.onnx \
            --length_scale 1.27 \
            --noise_scale 0.5 \
            --noise_w 0.45 \
            --sentence_silence 0.4 \
            --output_file "$wav" < "$txt"
          ffmpeg -y -i "$wav" -codec:a libmp3lame -qscale:a 2 "$mp3"
          rm -f "$wav"

      - name: Audio-Teil als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: audio-teil-${{ matrix.teil }}
          path: output/audio/teil_${{ matrix.teil }}.mp3
          retention-days: 1

  zusammenfuegen:
    needs: sprachsynthese
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Systempakete installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Alle Audio-Teile herunterladen
        uses: actions/download-artifact@v4
        with:
          pattern: audio-teil-*
          path: output/audio
          merge-multiple: true

      - name: Aufteilungsinfo herunterladen
        uses: actions/download-artifact@v4
        with:
          name: text-teile
          path: output

      - name: Gesamt-MP3 erzeugen
        shell: bash
        run: |
          mkdir -p output/meta
          ls output/audio/teil_*.mp3 | sort > output/meta/mp3_list_raw.txt
          BASE="$(pwd)"
          awk -v base="$BASE" '{print "file '\''" base "/" $0 "'\''"}' output/meta/mp3_list_raw.txt > output/meta/concat.txt
          ffmpeg -y -f concat -safe 0 -i output/meta/concat.txt \
            -metadata comment="Erstellt von Melvin-Udall - H-rb-cher Projekt" \
            -metadata artist="Melvin-Udall" \
            -c copy output/hoerbuch_gesamt.mp3

      - name: Dateinamen normalisieren
        shell: bash
        run: |
          mkdir -p release
          cp output/hoerbuch_gesamt.mp3 "release/00_hoerbuch_gesamt.mp3"
          i=1
          for f in $(ls output/audio/teil_*.mp3 | sort); do
            printf -v nr "%03d" "$i"
            cp "$f" "release/${nr}_$(basename "$f")"
            i=$((i+1))
          done
          cp output/meta/aufteilung.txt release/aufteilung.txt
          cp output/meta/textvorschau.txt release/textvorschau.txt
          if [ -f output/meta/glaettung_info.txt ]; then
            cp output/meta/glaettung_info.txt release/glaettung_info.txt
          fi

      - name: Release veröffentlichen
        uses: softprops/action-gh-release@v2
        with:
          tag_name: hoerbuch-${{ github.run_id }}
          name: Hörbuch ${{ github.run_id }}
          files: |
            release/*
          body: |
            Automatisch erstelltes Hörbuch
            Enthalten:
            - Gesamtdatei als MP3
            - Einzelteile als MP3
            - Textdatei mit Aufteilungsinfo
            - Textvorschau
            - Glättungsinfo (falls Gemini aktiviert war)

      - name: E-Mail mit Download-Link senden
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_PASSWORD }}
          subject: Hörbuch fertig - Run ${{ github.run_id }}
          to: ${{ secrets.RECIPIENT_EMAIL }}
          from: Hörbuch-Bot
          body: |
            Dein Hörbuch ist fertig.
            Download:
            https://github.com/Melvin-Udall/H-rb-cher/releases/tag/hoerbuch-${{ github.run_id }}
            Enthalten sind:
            - eine Gesamt-MP3
            - mehrere Teil-MP3s
            - eine Datei mit Aufteilungsinformationen
            - eine Textvorschau
            - optional eine Glättungsinfo
