name: Hörbuch erstellen

on:
  workflow_dispatch:
    inputs:
      quellsprache:
        description: 'Quellsprache (de oder en)'
        required: true
        default: 'de'
        type: choice
        options:
          - de
          - en

permissions:
  contents: write

jobs:

  textaufbereitung:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      matrix: ${{ steps.teilen.outputs.matrix }}
      teilanzahl: ${{ steps.teilen.outputs.teilanzahl }}
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python-Pakete installieren
        run: |
          pip install ebooklib beautifulsoup4 pymupdf transformers sentencepiece torch --quiet

      - name: Text extrahieren, übersetzen, glätten und in Teile splitten
        id: teilen
        run: |
          python3 -c "
          import os, re, glob, json, math

          quellsprache = '${{ github.event.inputs.quellsprache }}'

          dateien = glob.glob('text/buch.*')
          dateien = [d for d in dateien if not d.endswith('.gitkeep')]
          pfad = dateien[0]
          endung = pfad.split('.')[-1].lower()

          text = ''
          if endung == 'txt':
              with open(pfad, encoding='utf-8') as f:
                  text = f.read()
          elif endung == 'epub':
              from ebooklib import epub
              import ebooklib
              from bs4 import BeautifulSoup
              book = epub.read_epub(pfad)
              teile_roh = []
              for item in book.get_items():
                  if item.get_type() == ebooklib.ITEM_DOCUMENT:
                      soup = BeautifulSoup(item.get_content(), 'html.parser')
                      teile_roh.append(soup.get_text())
              text = '\n'.join(teile_roh)
          elif endung == 'pdf':
              import fitz
              doc = fitz.open(pfad)
              teile_roh = [seite.get_text() for seite in doc]
              text = '\n'.join(teile_roh)

          text = re.sub(r'(?<![.!?:])\n(?!\n)', ' ', text)
          text = re.sub(r' +', ' ', text)

          if quellsprache == 'en':
              from transformers import MarianMTModel, MarianTokenizer
              modellname = 'Helsinki-NLP/opus-mt-en-de'
              tok = MarianTokenizer.from_pretrained(modellname)
              modell = MarianMTModel.from_pretrained(modellname)
              saetze = re.split(r'(?<=[.!?]) +', text)
              uebersetzt = []
              for i in range(0, len(saetze), 16):
                  block = saetze[i:i+16]
                  eingabe = tok(block, return_tensors='pt', padding=True, truncation=True, max_length=400)
                  ausgabe = modell.generate(**eingabe, max_length=400)
                  uebersetzt.extend([tok.decode(o, skip_special_tokens=True) for o in ausgabe])
              text = ' '.join(uebersetzt)

          woerter = len(text.split())
          WOERTER_PRO_TEIL = 8000
          MAX_TEILE = 12
          anzahl_teile = max(1, min(MAX_TEILE, math.ceil(woerter / WOERTER_PRO_TEIL)))

          if woerter / anzahl_teile > WOERTER_PRO_TEIL:
              print(f'::warning::Text hat {woerter} Woerter, das Limit von {MAX_TEILE} Teilen wird erreicht. Pro Teil entfallen dadurch mehr als {WOERTER_PRO_TEIL} Woerter als geplant. Timeout im Blick behalten.')

          print(f'Wortanzahl: {woerter}')
          print(f'Berechnete Teilanzahl: {anzahl_teile}')

          saetze = re.split(r'(?<=[.!?]) +', text)
          gesamt_saetze = len(saetze)
          saetze_pro_teil = math.ceil(gesamt_saetze / anzahl_teile)

          os.makedirs('text', exist_ok=True)
          for i in range(anzahl_teile):
              start = i * saetze_pro_teil
              ende = start + saetze_pro_teil
              teiltext = ' '.join(saetze[start:ende])
              nummer = str(i + 1).zfill(2)
              with open(f'text/teil_{nummer}.txt', 'w', encoding='utf-8') as f:
                  f.write(teiltext)

          matrix_liste = [str(i + 1).zfill(2) for i in range(anzahl_teile)]
          github_output = os.environ['GITHUB_OUTPUT']
          with open(github_output, 'a') as f:
              f.write(f'matrix={json.dumps(matrix_liste)}\n')
              f.write(f'teilanzahl={anzahl_teile}\n')
          "

      - name: Textteile als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: textteile
          path: text/teil_*.txt
          retention-days: 1

  sprachsynthese:
    needs: textaufbereitung
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: true
      max-parallel: 6
      matrix:
        teil: ${{ fromJSON(needs.textaufbereitung.outputs.matrix) }}
    steps:
      - name: Textteile herunterladen
        uses: actions/download-artifact@v4
        with:
          name: textteile
          path: text

      - name: Piper installieren
        run: |
          wget https://github.com/rhasspy/piper/releases/download/2023.11.14-2/piper_linux_x86_64.tar.gz
          tar xzf piper_linux_x86_64.tar.gz

      - name: Thorsten-High-Stimme herunterladen
        run: |
          mkdir -p voices
          wget -O voices/de_DE-thorsten-high.onnx https://huggingface.co/rhasspy/piper-voices/resolve/main/de/de_DE/thorsten/high/de_DE-thorsten-high.onnx
          wget -O voices/de_DE-thorsten-high.onnx.json https://huggingface.co/rhasspy/piper-voices/resolve/main/de/de_DE/thorsten/high/de_DE-thorsten-high.onnx.json

      - name: Sprachsynthese mit Piper
        run: |
          ./piper/piper --model voices/de_DE-thorsten-high.onnx \
            --output_file teil_${{ matrix.teil }}.wav < text/teil_${{ matrix.teil }}.txt

      - name: FFmpeg installieren
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: WAV zu MP3 konvertieren
        run: |
          ffmpeg -i teil_${{ matrix.teil }}.wav -codec:a libmp3lame -qscale:a 2 teil_${{ matrix.teil }}.mp3

      - name: MP3-Teil als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: mp3-teil-${{ matrix.teil }}
          path: teil_${{ matrix.teil }}.mp3
          retention-days: 1

  zusammenfuegen:
    needs: [textaufbereitung, sprachsynthese]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Alle MP3-Teile herunterladen
        uses: actions/download-artifact@v4
        with:
          pattern: mp3-teil-*
          path: teile
          merge-multiple: true

      - name: FFmpeg installieren
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Reihenfolge-Liste für FFmpeg erstellen
        run: |
          for datei in $(ls teile/*.mp3 | sort); do
            echo "file '$datei'" >> liste.txt
          done

      - name: MP3-Teile zusammenfügen
        run: |
          ffmpeg -f concat -safe 0 -i liste.txt -c copy hoerbuch.mp3

      - name: MP3 als Release veröffentlichen
        uses: softprops/action-gh-release@v2
        with:
          tag_name: hoerbuch-${{ github.run_id }}
          files: "hoerbuch.mp3"
          body: "Automatisch erstelltes Hörbuch (${{ needs.textaufbereitung.outputs.teilanzahl }} Teile)"

      - name: E-Mail mit Download-Link senden
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_PASSWORD }}
          subject: "Dein fertiges Hörbuch"
          to: ${{ secrets.RECIPIENT_EMAIL }}
          from: Hörbuch-Bot
          body: "Dein Hörbuch ist fertig. Download hier: https://github.com/Melvin-Udall/H-rb-cher/releases/tag/hoerbuch-${{ github.run_id }}"
