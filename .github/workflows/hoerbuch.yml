name: Hörbuch erstellen

on:
  workflow_dispatch:
    inputs:
      quellsprache:
        description: "Quellsprache (de oder en)"
        required: true
        default: "de"
        type: choice
        options:
          - de
          - en
      text_ueberarbeiten:
        description: "Text vor Vertonung mit Gemini sprachlich glätten"
        required: true
        default: "ja"
        type: choice
        options:
          - ja
          - nein

jobs:
  textaufbereitung:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    outputs:
      matrix: ${{ steps.prep.outputs.matrix }}
      anzahl_teile: ${{ steps.prep.outputs.anzahl_teile }}
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python-Pakete installieren
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir \
            ebooklib \
            beautifulsoup4 \
            pymupdf \
            pdfplumber \
            lxml \
            transformers \
            sentencepiece \
            sacremoses \
            torch \
            google-generativeai

      - name: Text extrahieren und vorbereiten
        shell: bash
        run: |
          cat > script_extract.py <<'PY'
          import re
          import glob
          from pathlib import Path

          QUELLSPRACHE = "${{ github.event.inputs.quellsprache }}".strip().lower()
          TEXT_DIR = Path("text")
          TEXT_DIR.mkdir(parents=True, exist_ok=True)

          files = [Path(p) for p in glob.glob("text/buch.*") if not p.endswith(".gitkeep")]
          if not files:
              raise SystemExit("Fehler: Keine Datei text/buch.* gefunden.")
          if len(files) > 1:
              raise SystemExit("Fehler: Mehr als eine Datei text/buch.* gefunden.")

          pfad = files[0]
          endung = pfad.suffix.lower()

          def clean_text(t: str) -> str:
              t = t.replace("\r\n", "\n").replace("\r", "\n")
              t = t.replace("\u00ad", "")
              t = re.sub(r"[ \t]+", " ", t)
              t = re.sub(r"\n{3,}", "\n\n", t)
              t = re.sub(r"(?<![.!?:;,])\n(?!\n)", " ", t)
              t = re.sub(r" +", " ", t)
              t = re.sub(r" ?([,;:.!?])", r"\1", t)
              t = re.sub(r"([,;:.!?])([^\s\"'»)\]])", r"\1 \2", t)
              t = re.sub(r"\s+\n", "\n", t)
              t = re.sub(r"\n\s+", "\n", t)
              t = re.sub(r"\n{2,}", "\n\n", t)
              return t.strip()

          def read_txt(path: Path) -> str:
              for enc in ("utf-8", "utf-8-sig", "cp1252", "latin-1"):
                  try:
                      return path.read_text(encoding=enc)
                  except Exception:
                      pass
              raise SystemExit("Fehler: TXT-Datei konnte nicht gelesen werden.")

          def read_epub(path: Path) -> str:
              from ebooklib import epub
              import ebooklib
              from bs4 import BeautifulSoup
              book = epub.read_epub(str(path))
              teile = []
              for item in book.get_items():
                  if item.get_type() == ebooklib.ITEM_DOCUMENT:
                      soup = BeautifulSoup(item.get_content(), "html.parser")
                      text = soup.get_text("\n")
                      if text and text.strip():
                          teile.append(text.strip())
              return "\n\n".join(teile)

          def read_pdf(path: Path) -> str:
              import fitz
              teile = []
              with fitz.open(str(path)) as doc:
                  for seite in doc:
                      tx = seite.get_text()
                      if tx and tx.strip():
                          teile.append(tx.strip())
              return "\n\n".join(teile)

          if endung == ".txt":
              text = read_txt(pfad)
          elif endung == ".epub":
              text = read_epub(pfad)
          elif endung == ".pdf":
              text = read_pdf(pfad)
          else:
              raise SystemExit(f"Fehler: Nicht unterstützte Dateiendung: {endung}")

          text = clean_text(text)
          if not text or len(text) < 50:
              raise SystemExit("Fehler: Zu wenig lesbarer Text extrahiert.")

          if QUELLSPRACHE == "en":
              from transformers import MarianMTModel, MarianTokenizer
              modellname = "Helsinki-NLP/opus-mt-en-de"
              tokenizer = MarianTokenizer.from_pretrained(modellname)
              model = MarianMTModel.from_pretrained(modellname)
              saetze = re.split(r'(?<=[.!?])\s+', text)
              saetze = [s.strip() for s in saetze if s.strip()]
              uebersetzt = []
              batch = []
              batch_chars = 0
              max_batch_chars = 3500

              def flush_batch(batch_list):
                  if not batch_list:
                      return []
                  inputs = tokenizer(
                      batch_list,
                      return_tensors="pt",
                      padding=True,
                      truncation=True,
                      max_length=512
                  )
                  outputs = model.generate(**inputs, max_length=512)
                  return [tokenizer.decode(o, skip_special_tokens=True) for o in outputs]

              for s in saetze:
                  if len(s) > 1800:
                      sub = re.split(r'(?<=[,;:])\s+', s)
                  else:
                      sub = [s]
                  for piece in sub:
                      piece = piece.strip()
                      if not piece:
                          continue
                      if batch and batch_chars + len(piece) > max_batch_chars:
                          uebersetzt.extend(flush_batch(batch))
                          batch = []
                          batch_chars = 0
                      batch.append(piece)
                      batch_chars += len(piece)

              if batch:
                  uebersetzt.extend(flush_batch(batch))

              text = clean_text(" ".join(uebersetzt))

          (TEXT_DIR / "buch_glatt.txt").write_text(text, encoding="utf-8")
          PY
          python3 script_extract.py

      - name: Text mit Gemini sprachlich glätten
        if: ${{ github.event.inputs.text_ueberarbeiten == 'ja' }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        shell: bash
        run: |
          cat > script_gemini_rewrite.py <<'PY'
          import os
          import re
          import time
          from pathlib import Path
          import google.generativeai as genai

          api_key = os.environ.get("GEMINI_API_KEY", "").strip()
          if not api_key:
              raise SystemExit("Fehler: GitHub-Secret GEMINI_API_KEY fehlt oder ist leer.")

          genai.configure(api_key=api_key)
          model = genai.GenerativeModel("gemini-2.5-flash")

          text_path = Path("text/buch_glatt.txt")
          text = text_path.read_text(encoding="utf-8")

          paragraphs = [p.strip() for p in re.split(r"\n{2,}", text) if p.strip()]
          chunks = []
          current = []
          current_words = 0
          target_words = 2200

          def word_count(s: str) -> int:
              return len(re.findall(r"\S+", s))

          for p in paragraphs:
              w = word_count(p)
              if current and current_words + w > target_words:
                  chunks.append("\n\n".join(current).strip())
                  current = [p]
                  current_words = w
              else:
                  current.append(p)
                  current_words += w
          if current:
              chunks.append("\n\n".join(current).strip())

          prompt_prefix = (
              "Überarbeite den folgenden deutschen Buchtext ausschließlich für Text-to-Speech.\n"
              "Regeln:\n"
              "1. Sehr lange Sätze mit mehreren Nebensätzen in kürzere, einfachere Hauptsätze aufteilen. "
              "Kein Satz darf länger als 20 Wörter sein.\n"
              "2. Sehr kurze Sätze (unter 5 Wörter) mit dem vorherigen oder nächsten Satz sinnvoll verbinden.\n"
              "3. Doppelpunkte, die einen neuen Hauptsatz einleiten, wenn sinnvoll in Punkt plus neuen Satz umwandeln.\n"
              "4. Eingeschobene Nebensätze zwischen Gedankenstrichen auflösen oder glätten.\n"
              "5. Nur Standard-Satzzeichen verwenden: Punkt, Komma, Fragezeichen, Ausrufezeichen. "
              "Keine Gedankenstriche, Semikolons, Klammern, Auslassungspunkte oder Sonderzeichen im Fließtext.\n"
              "6. Zahlen als Ziffern beibehalten, aber niemals mehrere Satzzeichen direkt aneinanderreihen.\n"
              "7. Abkürzungen wie z.B., u.a., etc. ausschreiben, damit keine Punkt-Kürzel entstehen.\n"
              "8. Absatzstruktur beibehalten: Jeder inhaltliche Absatz aus dem Originaltext bleibt ein eigener Absatz, "
              "getrennt durch eine komplett leere Zeile. Absätze niemals zusammenführen.\n"
              "9. Keine inhaltlichen Kürzungen, keine Zusammenfassung, keine Auslassungen.\n"
              "10. Bedeutung und Reihenfolge der Informationen beibehalten.\n"
              "11. Nur den überarbeiteten Text ausgeben, keine Kommentare, keine Überschrift, keine Erklärung.\n\n"
              "TEXT:\n\n"
          )

          out_chunks = []
          report_lines = [f"Chunks gesamt: {len(chunks)}"]
          failed = []

          for idx, chunk in enumerate(chunks, start=1):
              success = False
              chunk_words = word_count(chunk)

              for attempt in range(1, 5):
                  try:
                      response = model.generate_content(
                          prompt_prefix + chunk,
                          generation_config={
                              "temperature": 0.2,
                              "max_output_tokens": 8192
                          }
                      )
                      result = (response.text or "").strip()

                      if not result:
                          raise ValueError("Leere Antwort")

                      result_words = word_count(result)

                      if result_words < int(chunk_words * 0.75):
                          raise ValueError(
                              f"Antwort zu kurz: Original {chunk_words} Wörter, Ergebnis {result_words} Wörter"
                          )

                      out_chunks.append(result)
                      report_lines.append(
                          f"Chunk {idx:03d}: OK | Original {chunk_words} Wörter | Ergebnis {result_words} Wörter"
                      )
                      success = True
                      break

                  except Exception as e:
                      if attempt < 4:
                          time.sleep(8 * attempt)
                      last_error = str(e)

              if not success:
                  out_chunks.append(chunk)
                  failed.append(idx)
                  report_lines.append(
                      f"Chunk {idx:03d}: FEHLER -> Original übernommen | {last_error}"
                  )

              time.sleep(2)

          rewritten = "\n\n".join(out_chunks).strip() + "\n"
          text_path.write_text(rewritten, encoding="utf-8")

          meta_dir = Path("output/meta")
          meta_dir.mkdir(parents=True, exist_ok=True)
          report_lines.append(f"Fehlgeschlagene Chunks: {failed}")
          (meta_dir / "glaettung_info.txt").write_text("\n".join(report_lines) + "\n", encoding="utf-8")
          PY
          python3 script_gemini_rewrite.py

      - name: Text final für Piper härten und in Sätze aufteilen
        shell: bash
        run: |
          cat > script_harden.py <<'PY'
          import re
          from pathlib import Path

          text_path = Path("text/buch_glatt.txt")
          text = text_path.read_text(encoding="utf-8")

          def grundhaertung(t: str) -> str:
              t = t.replace("–", ",").replace("—", ",")
              t = t.replace("„", '"').replace("“", '"').replace("‚", "'").replace("‘", "'")
              t = t.replace("…", ".")
              abkuerzungen = {
                  r"\bz\.B\.": "zum Beispiel",
                  r"\bu\.a\.": "unter anderem",
                  r"\betc\.": "und so weiter",
                  r"\bd\.h\.": "das heißt",
                  r"\bbzw\.": "beziehungsweise",
                  r"\bggf\.": "gegebenenfalls",
                  r"\busw\.": "und so weiter",
                  r"\bca\.": "circa",
                  r"\bNr\.": "Nummer",
                  r"\bDr\.": "Doktor",
                  r"\bProf\.": "Professor",
              }
              for muster, ersatz in abkuerzungen.items():
                  t = re.sub(muster, ersatz, t)
              t = re.sub(r"[;:]", ".", t)
              t = re.sub(r"\(([^)]*)\)", r", \1,", t)
              t = re.sub(r"[\[\]{}]", "", t)
              t = re.sub(r"[.]{2,}", ".", t)
              t = re.sub(r"[,]{2,}", ",", t)
              t = re.sub(r"\s*([.,!?])\s*([.,!?])", r"\1", t)
              t = re.sub(r"([.,!?])\1+", r"\1", t)
              t = re.sub(r"[ \t]+", " ", t)
              t = re.sub(r" ,", ",", t)
              t = re.sub(r" \.", ".", t)
              return t

          text = grundhaertung(text)

          absaetze = [p.strip() for p in re.split(r"\n{2,}", text) if p.strip()]
          absaetze_flach = []
          for absatz in absaetze:
              absatz = re.sub(r"\n", " ", absatz)
              absatz = re.sub(r" +", " ", absatz).strip()
              absaetze_flach.append(absatz)

          MIN_ZEICHEN = 40
          MAX_ZEICHEN = 100

          def stelle_satzzeichen_sicher(s: str) -> str:
              s = s.strip()
              if s and s[-1] not in ".!?":
                  s += "."
              return s

          def teile_zu_langen_satz(satz: str, max_z: int) -> list:
              if len(satz) <= max_z:
                  return [satz]
              teile = re.split(r',\s+', satz)
              ergebnis = []
              aktuell = ""
              for teil in teile:
                  kandidat = aktuell + (", " if aktuell else "") + teil
                  if len(kandidat) <= max_z:
                      aktuell = kandidat
                  else:
                      if aktuell:
                          ergebnis.append(stelle_satzzeichen_sicher(aktuell))
                      if len(teil) > max_z:
                          woerter = teil.split()
                          zeile = ""
                          for w in woerter:
                              kandidat2 = zeile + (" " if zeile else "") + w
                              if len(kandidat2) <= max_z:
                                  zeile = kandidat2
                              else:
                                  if zeile:
                                      ergebnis.append(stelle_satzzeichen_sicher(zeile))
                                  zeile = w
                          aktuell = zeile
                      else:
                          aktuell = teil
              if aktuell:
                  ergebnis.append(stelle_satzzeichen_sicher(aktuell))
              return ergebnis if ergebnis else [stelle_satzzeichen_sicher(satz[:max_z])]

          def fuehre_kurze_saetze_zusammen(saetze: list, min_z: int, max_z: int) -> list:
              ergebnis = []
              puffer = ""
              for satz in saetze:
                  if not puffer:
                      puffer = satz
                  else:
                      kandidat = puffer.rstrip()
                      if kandidat and kandidat[-1] not in ".!?":
                          kandidat += "."
                      kandidat = kandidat + " " + satz
                      if len(kandidat) <= max_z:
                          puffer = kandidat
                      else:
                          ergebnis.append(stelle_satzzeichen_sicher(puffer))
                          puffer = satz
                  if len(puffer) >= min_z:
                      ergebnis.append(stelle_satzzeichen_sicher(puffer))
                      puffer = ""
              if puffer:
                  if ergebnis and len(puffer) < min_z:
                      letzter = ergebnis.pop()
                      letzter_ohne_punkt = letzter.rstrip()
                      if letzter_ohne_punkt and letzter_ohne_punkt[-1] not in ".!?":
                          letzter_ohne_punkt += "."
                      zusammen = letzter_ohne_punkt + " " + puffer
                      if len(zusammen) <= max_z * 1.5:
                          ergebnis.append(stelle_satzzeichen_sicher(zusammen))
                      else:
                          ergebnis.append(letzter)
                          ergebnis.append(stelle_satzzeichen_sicher(puffer))
                  else:
                      ergebnis.append(stelle_satzzeichen_sicher(puffer))
              return ergebnis

          alle_zeilen = []

          for absatz in absaetze_flach:
              roh_saetze = re.split(r'(?<=[.!?])\s+', absatz)
              roh_saetze = [s.strip() for s in roh_saetze if s.strip()]

              zwischenschritt = []
              for satz in roh_saetze:
                  satz = stelle_satzzeichen_sicher(satz)
                  zwischenschritt.extend(teile_zu_langen_satz(satz, MAX_ZEICHEN))

              zusammengefuehrt = fuehre_kurze_saetze_zusammen(zwischenschritt, MIN_ZEICHEN, MAX_ZEICHEN)

              alle_zeilen.extend(zusammengefuehrt)
              alle_zeilen.append("")

          bereinigt = []
          letzte_war_leer = False
          for z in alle_zeilen:
              if z == "":
                  if not letzte_war_leer:
                      bereinigt.append("")
                  letzte_war_leer = True
              else:
                  bereinigt.append(z)
                  letzte_war_leer = False

          while bereinigt and bereinigt[0] == "":
              bereinigt.pop(0)
          while bereinigt and bereinigt[-1] == "":
              bereinigt.pop()

          ausgabe = "\n".join(bereinigt) + "\n"
          text_path.write_text(ausgabe, encoding="utf-8")

          nicht_leer = [z for z in bereinigt if z]
          print(f"Zeilen gesamt: {len(nicht_leer)}")
          PY
          python3 script_harden.py

      - name: Text aufteilen
        id: prep
        shell: bash
        run: |
          cat > script_prepare.py <<'PY'
          import re
          import math
          import json
          from pathlib import Path

          OUT_DIR = Path("output")
          PARTS_DIR = OUT_DIR / "parts"
          META_DIR = OUT_DIR / "meta"
          OUT_DIR.mkdir(parents=True, exist_ok=True)
          PARTS_DIR.mkdir(parents=True, exist_ok=True)
          META_DIR.mkdir(parents=True, exist_ok=True)

          text = Path("text/buch_glatt.txt").read_text(encoding="utf-8")

          total_chars = len(text)
          words = len(re.findall(r"\S+", text))

          target_chars_per_part = 90000
          min_chars_per_part = 40000
          max_chars_per_part = 120000

          estimated_parts = max(1, math.ceil(total_chars / target_chars_per_part))
          estimated_parts = min(estimated_parts, 12)
          target_chars = max(min_chars_per_part, min(max_chars_per_part, math.ceil(total_chars / estimated_parts)))

          lines = text.split("\n")

          parts = []
          current_lines = []
          cur_len = 0

          for line in lines:
              current_lines.append(line)
              cur_len += len(line) + 1
              is_blank = (line.strip() == "")
              erreicht_ziel = cur_len >= target_chars
              erreicht_max = cur_len >= max_chars_per_part
              if (erreicht_ziel and is_blank) or erreicht_max:
                  parts.append(current_lines)
                  current_lines = []
                  cur_len = 0

          if current_lines:
              rest_len = sum(len(x) + 1 for x in current_lines)
              if parts and rest_len < min_chars_per_part:
                  parts[-1].extend(current_lines)
              else:
                  parts.append(current_lines)

          if not parts:
              parts = [lines]

          if len(parts) > 12:
              zusammengefasst = parts[:11]
              rest = parts[11:]
              rest_lines = []
              for p in rest:
                  rest_lines.extend(p)
              zusammengefasst.append(rest_lines)
              parts = zusammengefasst

          def block_len(block_lines):
              return sum(len(x) + 1 for x in block_lines)

          for idx, block_lines in enumerate(parts, start=1):
              inhalt = "\n".join(block_lines).strip() + "\n"
              (PARTS_DIR / f"teil_{idx:03d}.txt").write_text(inhalt, encoding="utf-8")

          info = []
          info.append(f"Zeichen gesamt: {total_chars}")
          info.append(f"Wörter gesamt: {words}")
          info.append(f"Anzahl Teile: {len(parts)}")
          info.append(f"Ziel-Zeichen pro Teil: {target_chars}")
          for idx, block_lines in enumerate(parts, start=1):
              info.append(f"Teil {idx:03d}: {block_len(block_lines)} Zeichen")

          (META_DIR / "aufteilung.txt").write_text("\n".join(info) + "\n", encoding="utf-8")

          vorschau = []
          for idx, block_lines in enumerate(parts, start=1):
              teil_text = " ".join(block_lines)
              woerter = re.findall(r"\S+", teil_text)
              erste5 = " ".join(woerter[:5])
              letzte5 = " ".join(woerter[-5:]) if len(woerter) >= 5 else " ".join(woerter)
              vorschau.append(f"Teil {idx:03d}: [{erste5}] ... [{letzte5}]")

          (META_DIR / "textvorschau.txt").write_text("\n".join(vorschau) + "\n", encoding="utf-8")

          matrix_liste = [f"{i:03d}" for i in range(1, len(parts) + 1)]
          (META_DIR / "matrix.json").write_text(json.dumps(matrix_liste), encoding="utf-8")
          (META_DIR / "anzahl.txt").write_text(str(len(parts)), encoding="utf-8")
          PY
          python3 script_prepare.py
          echo "matrix=$(cat output/meta/matrix.json)" >> "$GITHUB_OUTPUT"
          echo "anzahl_teile=$(cat output/meta/anzahl.txt)" >> "$GITHUB_OUTPUT"

      - name: Textteile als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: text-teile
          path: |
            output/parts/
            output/meta/aufteilung.txt
            output/meta/textvorschau.txt
            output/meta/glaettung_info.txt
          retention-days: 1

  sprachsynthese:
    needs: textaufbereitung
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: true
      max-parallel: 6
      matrix:
        teil: ${{ fromJson(needs.textaufbereitung.outputs.matrix) }}
    steps:
      - name: Systempakete installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg wget

      - name: Textteile herunterladen
        uses: actions/download-artifact@v4
        with:
          name: text-teile
          path: output

      - name: Piper installieren
        run: |
          wget -q https://github.com/rhasspy/piper/releases/download/2023.11.14-2/piper_linux_x86_64.tar.gz
          tar xzf piper_linux_x86_64.tar.gz

      - name: Thorsten-High-Stimme herunterladen
        run: |
          mkdir -p voices
          wget -q -O voices/de_DE-thorsten-high.onnx \
            https://huggingface.co/rhasspy/piper-voices/resolve/main/de/de_DE/thorsten/high/de_DE-thorsten-high.onnx
          wget -q -O voices/de_DE-thorsten-high.onnx.json \
            https://huggingface.co/rhasspy/piper-voices/resolve/main/de/de_DE/thorsten/high/de_DE-thorsten-high.onnx.json

      - name: Audio-Teil erzeugen mit automatischer Qualitätsprüfung
        shell: bash
        run: |
          mkdir -p output/audio output/meta
          cat > script_synthese.py <<'PY'
          import subprocess
          import sys
          import wave
          import array
          import math
          from pathlib import Path

          TEIL = sys.argv[1]
          TXT_PATH = Path(f"output/parts/teil_{TEIL}.txt")
          VOICE = "voices/de_DE-thorsten-high.onnx"
          RAW_WAV = Path(f"output/audio/teil_{TEIL}_raw.wav")
          FINAL_WAV = Path(f"output/audio/teil_{TEIL}.wav")
          FINAL_MP3 = Path(f"output/audio/teil_{TEIL}.mp3")
          REPORT = Path(f"output/meta/qualitaet_teil_{TEIL}.txt")

          BASE_PARAMS = ["--length_scale", "1.20", "--noise_scale", "0.667",
                         "--noise_w", "0.8", "--sentence_silence", "0.35"]

          lines = [l.strip() for l in TXT_PATH.read_text(encoding="utf-8").split("\n") if l.strip()]

          def run_piper(text, out_wav, params):
              proc = subprocess.run(
                  ["./piper/piper", "--model", VOICE, *params, "--output_file", str(out_wav)],
                  input=text.encode("utf-8"), capture_output=True
              )
              return proc.returncode == 0 and out_wav.exists() and out_wav.stat().st_size > 0

          def read_wav_samples(path):
              with wave.open(str(path), "rb") as w:
                  n = w.getnframes()
                  sr = w.getframerate()
                  sw = w.getsampwidth()
                  ch = w.getnchannels()
                  raw = w.readframes(n)
              if sw == 2:
                  samples = array.array("h", raw)
              else:
                  samples = array.array("b", raw)
              if ch > 1:
                  samples = samples[::ch]
              return samples, sr

          def write_wav_samples(path, samples, sr):
              with wave.open(str(path), "wb") as w:
                  w.setnchannels(1)
                  w.setsampwidth(2)
                  w.setframerate(sr)
                  w.writeframes(array.array("h", samples).tobytes())

          def rms_windows(samples, sr, window_ms=20):
              win = max(1, int(sr * window_ms / 1000))
              energies = []
              for i in range(0, max(0, len(samples) - win), win):
                  chunk = samples[i:i + win]
                  s = sum(x * x for x in chunk) / len(chunk)
                  energies.append(math.sqrt(s))
              return energies, win

          def find_boundaries(samples, sr, n_segments):
              energies, win = rms_windows(samples, sr)
              if not energies:
                  return []
              max_e = max(energies) or 1
              threshold = max_e * 0.02
              silence_runs = []
              run_start = None
              for idx, e in enumerate(energies):
                  if e < threshold:
                      if run_start is None:
                          run_start = idx
                  else:
                      if run_start is not None:
                          silence_runs.append((run_start, idx))
                          run_start = None
              if run_start is not None:
                  silence_runs.append((run_start, len(energies)))
              silence_runs.sort(key=lambda r: r[1] - r[0], reverse=True)
              needed = max(0, n_segments - 1)
              chosen = sorted(silence_runs[:needed], key=lambda r: r[0])
              return [int(((a + b) / 2) * win) for a, b in chosen]

          def segment_audio(samples, boundaries):
              segs = []
              prev = 0
              for b in boundaries:
                  segs.append(samples[prev:b])
                  prev = b
              segs.append(samples[prev:])
              return segs

          MAX_CHARS_PRO_SEK = 17.0
          MIN_CHARS_PRO_SEK_CHECK = 4.0

          report_lines = [f"Teil {TEIL}: {len(lines)} Zeilen"]

          if not run_piper("\n".join(lines), RAW_WAV, BASE_PARAMS):
              print(f"FEHLER: Grundsynthese fehlgeschlagen fuer Teil {TEIL}", file=sys.stderr)
              sys.exit(1)

          samples, sr = read_wav_samples(RAW_WAV)
          boundaries = find_boundaries(samples, sr, len(lines))
          segments = segment_audio(samples, boundaries)

          if len(segments) != len(lines):
              report_lines.append(
                  f"WARNUNG: Segmentanzahl ({len(segments)}) != Zeilenanzahl ({len(lines)}). "
                  f"Automatische Einzelpruefung fuer diesen Teil uebersprungen, Originalaudio wird verwendet."
              )
              write_wav_samples(FINAL_WAV, samples, sr)
          else:
              fixed_segments = []
              anzahl_fixes = 0
              for idx, (line, seg) in enumerate(zip(lines, segments), start=1):
                  dauer = len(seg) / sr if sr else 0
                  chars = len(line)
                  rate = chars / dauer if dauer > 0 else 999
                  ok = (dauer > 0) and (rate <= MAX_CHARS_PRO_SEK) and (rate >= MIN_CHARS_PRO_SEK_CHECK or chars < 20)

                  if ok:
                      fixed_segments.append(seg)
                      continue

                  anzahl_fixes += 1
                  report_lines.append(
                      f"Zeile {idx:04d} auffaellig: {chars} Zeichen, {dauer:.2f}s, "
                      f"{rate:.1f} Zeichen/Sek -> {line[:70]}"
                  )

                  geloest = False
                  versuche = [
                      ["--length_scale", "1.20", "--noise_scale", "0.667", "--noise_w", "0.8", "--sentence_silence", "0.35"],
                      ["--length_scale", "1.35", "--noise_scale", "0.667", "--noise_w", "0.8", "--sentence_silence", "0.35"],
                      ["--length_scale", "1.50", "--noise_scale", "0.667", "--noise_w", "0.9", "--sentence_silence", "0.35"],
                  ]
                  tmp_wav = Path(f"output/audio/fix_{TEIL}_{idx:04d}.wav")

                  for v_idx, params in enumerate(versuche, start=1):
                      if run_piper(line, tmp_wav, params):
                          fix_samples, fix_sr = read_wav_samples(tmp_wav)
                          fix_dauer = len(fix_samples) / fix_sr if fix_sr else 0
                          fix_rate = chars / fix_dauer if fix_dauer > 0 else 999
                          if fix_dauer > 0 and fix_rate <= MAX_CHARS_PRO_SEK:
                              fixed_segments.append(fix_samples)
                              report_lines.append(
                                  f"  -> behoben in Versuch {v_idx} ({fix_dauer:.2f}s, {fix_rate:.1f} Zeichen/Sek)"
                              )
                              geloest = True
                              tmp_wav.unlink(missing_ok=True)
                              break
                      tmp_wav.unlink(missing_ok=True)

                  if not geloest:
                      woerter = line.split()
                      if len(woerter) >= 4:
                          mitte = len(woerter) // 2
                          teil_a = " ".join(woerter[:mitte])
                          teil_b = " ".join(woerter[mitte:])
                          erfolge = []
                          for t in (teil_a, teil_b):
                              tmp2 = Path(f"output/audio/fixsplit_{TEIL}_{idx:04d}_{len(erfolge)}.wav")
                              if run_piper(t, tmp2, versuche[1]):
                                  s2, sr2 = read_wav_samples(tmp2)
                                  erfolge.append(s2)
                              tmp2.unlink(missing_ok=True)
                          if len(erfolge) == 2:
                              fixed_segments.append(erfolge[0])
                              fixed_segments.append(erfolge[1])
                              report_lines.append("  -> in zwei Haelften aufgeteilt und einzeln synthetisiert")
                              geloest = True

                  if not geloest:
                      fixed_segments.append(seg)
                      report_lines.append("  -> keine Verbesserung erreicht, Original-Segment beibehalten")

              zusammengefuegt = array.array("h")
              pause_samples = array.array("h", [0]) * int(sr * 0.35)
              for i, seg in enumerate(fixed_segments):
                  zusammengefuegt.extend(seg)
                  if i < len(fixed_segments) - 1:
                      zusammengefuegt.extend(pause_samples)

              write_wav_samples(FINAL_WAV, zusammengefuegt, sr)
              report_lines.append(f"Anzahl automatisch korrigierter Zeilen: {anzahl_fixes}")

          Path("output/meta").mkdir(parents=True, exist_ok=True)
          REPORT.write_text("\n".join(report_lines) + "\n", encoding="utf-8")

          subprocess.run(
              ["ffmpeg", "-y", "-i", str(FINAL_WAV), "-codec:a", "libmp3lame", "-qscale:a", "2", str(FINAL_MP3)],
              capture_output=True
          )
          RAW_WAV.unlink(missing_ok=True)
          FINAL_WAV.unlink(missing_ok=True)
          PY
          python3 script_synthese.py "${{ matrix.teil }}"

      - name: Audio-Teil als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: audio-teil-${{ matrix.teil }}
          path: output/audio/teil_${{ matrix.teil }}.mp3
          retention-days: 1

      - name: Qualitätsbericht als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: qualitaet-teil-${{ matrix.teil }}
          path: output/meta/qualitaet_teil_${{ matrix.teil }}.txt
          retention-days: 7

  zusammenfuegen:
    needs: sprachsynthese
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Systempakete installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Alle Audio-Teile herunterladen
        uses: actions/download-artifact@v4
        with:
          pattern: audio-teil-*
          path: output/audio
          merge-multiple: true

      - name: Alle Qualitätsberichte herunterladen
        uses: actions/download-artifact@v4
        with:
          pattern: qualitaet-teil-*
          path: output/meta
          merge-multiple: true

      - name: Aufteilungsinfo herunterladen
        uses: actions/download-artifact@v4
        with:
          name: text-teile
          path: output

      - name: Gesamt-Qualitätsbericht zusammenfassen
        shell: bash
        run: |
          cat output/meta/qualitaet_teil_*.txt > output/meta/qualitaet_gesamt.txt 2>/dev/null || true

      - name: Gesamt-MP3 erzeugen
        shell: bash
        run: |
          mkdir -p output/meta
          ls output/audio/teil_*.mp3 | sort > output/meta/mp3_list_raw.txt
          BASE="$(pwd)"
          awk -v base="$BASE" '{print "file '\''" base "/" $0 "'\''"}' output/meta/mp3_list_raw.txt > output/meta/concat.txt
          ffmpeg -y -f concat -safe 0 -i output/meta/concat.txt \
            -metadata comment="Erstellt von Melvin-Udall - H-rb-cher Projekt" \
            -metadata artist="Melvin-Udall" \
            -c copy output/hoerbuch_gesamt.mp3

      - name: Dateinamen normalisieren
        shell: bash
        run: |
          mkdir -p release
          cp output/hoerbuch_gesamt.mp3 "release/00_hoerbuch_gesamt.mp3"
          i=1
          for f in $(ls output/audio/teil_*.mp3 | sort); do
            printf -v nr "%03d" "$i"
            cp "$f" "release/${nr}_$(basename "$f")"
            i=$((i+1))
          done
          cp output/meta/aufteilung.txt release/aufteilung.txt
          cp output/meta/textvorschau.txt release/textvorschau.txt
          if [ -f output/meta/glaettung_info.txt ]; then
            cp output/meta/glaettung_info.txt release/glaettung_info.txt
          fi
          if [ -f output/meta/qualitaet_gesamt.txt ]; then
            cp output/meta/qualitaet_gesamt.txt release/qualitaet_gesamt.txt
          fi

      - name: Release veröffentlichen
        uses: softprops/action-gh-release@v2
        with:
          tag_name: hoerbuch-${{ github.run_id }}
          name: Hörbuch ${{ github.run_id }}
          files: |
            release/*
          body: |
            Automatisch erstelltes Hörbuch
            Enthalten:
            - Gesamtdatei als MP3
            - Einzelteile als MP3
            - Textdatei mit Aufteilungsinfo
            - Textvorschau
            - Glättungsinfo (falls Gemini aktiviert war)
            - Qualitätsbericht (automatisch erkannte und korrigierte Stellen)

      - name: E-Mail mit Download-Link senden
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_PASSWORD }}
          subject: Hörbuch fertig - Run ${{ github.run_id }}
          to: ${{ secrets.RECIPIENT_EMAIL }}
          from: Hörbuch-Bot
          body: |
            Dein Hörbuch ist fertig.
            Download:
            https://github.com/Melvin-Udall/H-rb-cher/releases/tag/hoerbuch-${{ github.run_id }}
            Enthalten sind:
            - eine Gesamt-MP3
            - mehrere Teil-MP3s
            - eine Datei mit Aufteilungsinformationen
            - eine Textvorschau
            - optional eine Glättungsinfo
            - ein Qualitätsbericht mit automatisch erkannten und korrigierten Stellen
