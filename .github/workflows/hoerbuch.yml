name: Hörbuch erstellen

on:
  workflow_dispatch:
    inputs:
      quellsprache:
        description: "Quellsprache (de oder en)"
        required: true
        default: "de"
        type: choice
        options:
          - de
          - en

jobs:
  textaufbereitung:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    outputs:
      matrix: ${{ steps.prep.outputs.matrix }}
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python-Pakete installieren
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir \
            ebooklib beautifulsoup4 pymupdf pdfplumber lxml \
            transformers sentencepiece sacremoses torch spacy
          python -m spacy download de_core_news_sm

      - name: Text extrahieren und vorbereiten
        shell: bash
        run: |
          mkdir -p output/meta
          cat > script_extract.py <<'PY'
          import re, glob
          from pathlib import Path

          QUELLSPRACHE = "${{ github.event.inputs.quellsprache }}".strip().lower()
          TEXT_DIR = Path("text")
          TEXT_DIR.mkdir(parents=True, exist_ok=True)
          META = Path("output/meta")

          files = [Path(p) for p in glob.glob("text/buch.*") if not p.endswith(".gitkeep")]
          if not files:
              raise SystemExit("Fehler: Keine Datei text/buch.* gefunden.")
          if len(files) > 1:
              raise SystemExit("Fehler: Mehr als eine Datei text/buch.* gefunden.")

          pfad = files[0]
          endung = pfad.suffix.lower()

          def clean_text(t: str) -> str:
              t = t.replace("\r\n", "\n").replace("\r", "\n").replace("\u00ad", "")
              t = re.sub(r"[ \t]+", " ", t)
              t = re.sub(r"\n{3,}", "\n\n", t)
              t = re.sub(r"(?<![.!?:;,])\n(?!\n)", " ", t)
              t = re.sub(r" +", " ", t)
              t = re.sub(r" ?([,;:.!?])", r"\1", t)
              t = re.sub(r"([,;:.!?])([^\s\"'»)\]])", r"\1 \2", t)
              t = re.sub(r"\s+\n", "\n", t)
              t = re.sub(r"\n\s+", "\n", t)
              t = re.sub(r"\n{2,}", "\n\n", t)
              return t.strip()

          def read_txt(path):
              for enc in ("utf-8", "utf-8-sig", "cp1252", "latin-1"):
                  try:
                      return path.read_text(encoding=enc)
                  except Exception:
                      pass
              raise SystemExit("Fehler: TXT-Datei konnte nicht gelesen werden.")

          def read_epub(path):
              from ebooklib import epub
              import ebooklib
              from bs4 import BeautifulSoup
              book = epub.read_epub(str(path))
              teile = []
              for item in book.get_items():
                  if item.get_type() == ebooklib.ITEM_DOCUMENT:
                      soup = BeautifulSoup(item.get_content(), "html.parser")
                      tx = soup.get_text("\n")
                      if tx and tx.strip():
                          teile.append(tx.strip())
              return "\n\n".join(teile)

          def read_pdf(path):
              import fitz
              teile = []
              with fitz.open(str(path)) as doc:
                  for seite in doc:
                      tx = seite.get_text()
                      if tx and tx.strip():
                          teile.append(tx.strip())
              return "\n\n".join(teile)

          if endung == ".txt":
              text = read_txt(pfad)
          elif endung == ".epub":
              text = read_epub(pfad)
          elif endung == ".pdf":
              text = read_pdf(pfad)
          else:
              raise SystemExit(f"Fehler: Nicht unterstützte Dateiendung: {endung}")

          text = clean_text(text)
          if not text or len(text) < 50:
              raise SystemExit("Fehler: Zu wenig lesbarer Text extrahiert.")

          if QUELLSPRACHE == "en":
              from transformers import MarianMTModel, MarianTokenizer
              tok = MarianTokenizer.from_pretrained("Helsinki-NLP/opus-mt-en-de")
              model = MarianMTModel.from_pretrained("Helsinki-NLP/opus-mt-en-de")
              saetze = [s.strip() for s in re.split(r'(?<=[.!?])\s+', text) if s.strip()]
              uebersetzt, batch, batch_chars = [], [], 0
              def flush(b):
                  if not b: return []
                  inp = tok(b, return_tensors="pt", padding=True, truncation=True, max_length=512)
                  out = model.generate(**inp, max_length=512)
                  return [tok.decode(o, skip_special_tokens=True) for o in out]
              for s in saetze:
                  pieces = re.split(r'(?<=[,;:])\s+', s) if len(s) > 1800 else [s]
                  for p in pieces:
                      p = p.strip()
                      if not p: continue
                      if batch and batch_chars + len(p) > 3500:
                          uebersetzt.extend(flush(batch)); batch, batch_chars = [], 0
                      batch.append(p); batch_chars += len(p)
              if batch: uebersetzt.extend(flush(batch))
              text = clean_text(" ".join(uebersetzt))

          Path("text/buch_glatt.txt").write_text(text, encoding="utf-8")
          META.mkdir(parents=True, exist_ok=True)
          (META / "01_extraktion.txt").write_text(
              f"Quelldatei: {pfad.name}\nQuellsprache: {QUELLSPRACHE}\n"
              f"Zeichen extrahiert: {len(text)}\n", encoding="utf-8"
          )
          PY
          python3 script_extract.py

      - name: Text mit spaCy sprachlich glätten
        shell: bash
        run: |
          cat > script_spacy_smooth.py <<'PY'
          import re
          from pathlib import Path
          import spacy

          nlp = spacy.load("de_core_news_sm")
          text_path = Path("text/buch_glatt.txt")
          text = text_path.read_text(encoding="utf-8")

          PARA_MARKER = "\u0001PARA\u0001"
          text_mit_marker = re.sub(r"\n{2,}", f" {PARA_MARKER} ", text)
          text_mit_marker = re.sub(r"\n", " ", text_mit_marker)

          MAX_SATZLAENGE_WOERTER = 20
          MIN_SATZLAENGE_WOERTER = 5

          def teile_langen_satz(doc_span):
              woerter = [t.text for t in doc_span]
              if len(woerter) <= MAX_SATZLAENGE_WOERTER:
                  return [doc_span.text]
              teilsaetze, aktuell = [], []
              for token in doc_span:
                  aktuell.append(token.text)
                  ist_komma_konjunktion = token.text in (",",) and len(aktuell) >= MAX_SATZLAENGE_WOERTER * 0.6
                  if len(aktuell) >= MAX_SATZLAENGE_WOERTER or ist_komma_konjunktion:
                      satz = " ".join(aktuell).strip()
                      satz = re.sub(r"\s+([,.!?])", r"\1", satz)
                      if satz and satz[-1] not in ".!?":
                          satz += "."
                      teilsaetze.append(satz)
                      aktuell = []
              if aktuell:
                  satz = " ".join(aktuell).strip()
                  satz = re.sub(r"\s+([,.!?])", r"\1", satz)
                  if satz and satz[-1] not in ".!?":
                      satz += "."
                  teilsaetze.append(satz)
              return teilsaetze

          doc = nlp(text_mit_marker)
          ausgabe_saetze = []
          puffer_kurz = ""

          for satz in doc.sents:
              satz_text = satz.text.strip()
              if not satz_text:
                  continue
              woerter_anzahl = len([t for t in satz if not t.is_space])
              if woerter_anzahl < MIN_SATZLAENGE_WOERTER:
                  puffer_kurz = (puffer_kurz + " " + satz_text).strip() if puffer_kurz else satz_text
                  continue
              if puffer_kurz:
                  satz_text = puffer_kurz + " " + satz_text
                  puffer_kurz = ""
              if woerter_anzahl > MAX_SATZLAENGE_WOERTER:
                  ausgabe_saetze.extend(teile_langen_satz(satz))
              else:
                  ausgabe_saetze.append(satz_text)

          if puffer_kurz:
              if ausgabe_saetze:
                  ausgabe_saetze[-1] = ausgabe_saetze[-1] + " " + puffer_kurz
              else:
                  ausgabe_saetze.append(puffer_kurz)

          endtext = " ".join(ausgabe_saetze)
          endtext = re.sub(rf"\s*{re.escape(PARA_MARKER)}\s*", "\n\n", endtext)
          endtext = re.sub(r"[ \t]+", " ", endtext).strip()
          text_path.write_text(endtext + "\n", encoding="utf-8")

          Path("output/meta/02_glaettung.txt").write_text(
              f"Methode: spaCy (de_core_news_sm), regelbasiert, deterministisch\n"
              f"Max. Satzlaenge (Woerter): {MAX_SATZLAENGE_WOERTER}\n"
              f"Min. Satzlaenge (Woerter): {MIN_SATZLAENGE_WOERTER}\n"
              f"Saetze nach Glaettung: {len(ausgabe_saetze)}\n",
              encoding="utf-8"
          )
          PY
          python3 script_spacy_smooth.py

      - name: Text für XTTS härten
        shell: bash
        run: |
          cat > script_harden.py <<'PY'
          import re
          from pathlib import Path

          text_path = Path("text/buch_glatt.txt")
          text = text_path.read_text(encoding="utf-8")

          def entferne_quellenverweise(t):
              t = re.sub(r"[\u00b9\u00b2\u00b3\u2070\u2074-\u2079]+", "", t)
              t = re.sub(r"\[\s*\d+(?:\s*,\s*S\.?\s*\d+)?\s*\]", "", t)
              zitat_muster = (
                  r"\((?:[^()]|\([^()]*\))*?"
                  r"(?:vgl\.|Vgl\.|ebd\.|Ebd\.|zit\.\s*nach|Zit\.\s*nach|"
                  r"Hervorhebung|Anm\.|S\.\s?\d+|Bd\.\s?\d+|Nr\.\s?\d+|"
                  r"Abb\.\s?\d+|Tab\.\s?\d+|et\s?al\.|f{1,2}\.)"
                  r"(?:[^()]|\([^()]*\))*?\)"
              )
              t = re.sub(zitat_muster, "", t, flags=re.IGNORECASE)
              t = re.sub(r"[ \t]{2,}", " ", t)
              t = re.sub(r"\s+([.,!?])", r"\1", t)
              return t

          def grundhaertung(t):
              t = entferne_quellenverweise(t)
              t = t.replace("\u2013", ",").replace("\u2014", ",")
              t = t.replace("\u201e", '"').replace("\u201c", '"').replace("\u201a", "'").replace("\u2018", "'").replace("\u2019", "'")
              t = t.replace("\u2026", ".")
              for muster, ersatz in {
                  r"\bz\.B\.": "zum Beispiel", r"\bu\.a\.": "unter anderem",
                  r"\betc\.": "und so weiter", r"\bd\.h\.": "das heißt",
                  r"\bbzw\.": "beziehungsweise", r"\bggf\.": "gegebenenfalls",
                  r"\busw\.": "und so weiter", r"\bca\.": "circa",
                  r"\bNr\.": "Nummer", r"\bDr\.": "Doktor", r"\bProf\.": "Professor",
              }.items():
                  t = re.sub(muster, ersatz, t)
              t = re.sub(r"[;:]", ".", t)
              t = re.sub(r"\(([^)]*)\)", r", \1,", t)
              t = re.sub(r"[\[\]{}]", "", t)
              t = re.sub(r"[.]{2,}", ".", t)
              t = re.sub(r"[,]{2,}", ",", t)
              t = re.sub(r"\s*([.,!?])\s*([.,!?])", r"\1", t)
              t = re.sub(r"([.,!?])\1+", r"\1", t)
              t = re.sub(r"[ \t]+", " ", t)
              t = re.sub(r" ,", ",", t)
              t = re.sub(r" \.", ".", t)
              return t

          text = grundhaertung(text)
          absaetze = [re.sub(r"\s+", " ", p).strip() for p in re.split(r"\n{2,}", text) if p.strip()]

          MAX_Z = 220

          def teile_lang(satz, max_z):
              if len(satz) <= max_z: return [satz]
              woerter, zeilen, zeile = satz.split(), [], ""
              for w in woerter:
                  kand = zeile + (" " if zeile else "") + w
                  if len(kand) <= max_z:
                      zeile = kand
                  else:
                      if zeile: zeilen.append(zeile)
                      zeile = w
              if zeile: zeilen.append(zeile)
              return zeilen

          alle = []
          for absatz in absaetze:
              roh = [s.strip() for s in re.split(r'(?<=[.!?])\s+', absatz) if s.strip()]
              for s in roh:
                  alle.extend(teile_lang(s, MAX_Z))
              alle.append("")

          bereinigt, leer = [], False
          for z in alle:
              if z == "":
                  if not leer: bereinigt.append("")
                  leer = True
              else:
                  bereinigt.append(z); leer = False
          while bereinigt and bereinigt[0] == "": bereinigt.pop(0)
          while bereinigt and bereinigt[-1] == "": bereinigt.pop()

          text_path.write_text("\n".join(bereinigt) + "\n", encoding="utf-8")
          nicht_leer = [z for z in bereinigt if z]
          Path("output/meta/03_haertung.txt").write_text(
              f"Zeilen nach Haertung (Saetze, fuer XTTS): {len(nicht_leer)}\n"
              f"Max. Zeichen pro Zeile: {MAX_Z}\n",
              encoding="utf-8"
          )
          PY
          python3 script_harden.py

      - name: Text aufteilen
        id: prep
        shell: bash
        run: |
          cat > script_prepare.py <<'PY'
          import re, math, json
          from pathlib import Path

          PARTS_DIR = Path("output/parts"); PARTS_DIR.mkdir(parents=True, exist_ok=True)
          META = Path("output/meta")

          text = Path("text/buch_glatt.txt").read_text(encoding="utf-8")
          total_chars = len(text)

          target, min_c, max_c = 90000, 40000, 120000
          est_parts = min(max(1, math.ceil(total_chars / target)), 12)
          target_chars = max(min_c, min(max_c, math.ceil(total_chars / est_parts)))

          lines = text.split("\n")
          parts, current, cur_len = [], [], 0
          for line in lines:
              current.append(line); cur_len += len(line) + 1
              is_blank = (line.strip() == "")
              if (cur_len >= target_chars and is_blank) or cur_len >= max_c:
                  parts.append(current); current, cur_len = [], 0
          if current:
              if parts and sum(len(x)+1 for x in current) < min_c:
                  parts[-1].extend(current)
              else:
                  parts.append(current)
          if not parts: parts = [lines]

          groesster_teil = max(sum(len(x)+1 for x in p) for p in parts)
          if len(parts) < 2 and total_chars > max_c:
              raise SystemExit(
                  f"Fehler: Aufteilung fehlgeschlagen. Nur {len(parts)} Teil(e) bei "
                  f"{total_chars} Zeichen gesamt. Abbruch statt fehlerhaften Lauf."
              )
          if groesster_teil > max_c * 1.5:
              raise SystemExit(
                  f"Fehler: Ein Teil ist mit {groesster_teil} Zeichen deutlich zu groß. Abbruch."
              )

          for idx, block in enumerate(parts, start=1):
              (PARTS_DIR / f"teil_{idx:03d}.txt").write_text(
                  "\n".join(block).strip() + "\n", encoding="utf-8"
              )

          info = [f"Zeichen gesamt: {total_chars}", f"Anzahl Teile: {len(parts)}"]
          for idx, block in enumerate(parts, start=1):
              info.append(f"Teil {idx:03d}: {sum(len(x)+1 for x in block)} Zeichen")
          (META / "04_aufteilung.txt").write_text("\n".join(info) + "\n", encoding="utf-8")

          (META / "matrix.json").write_text(json.dumps([f"{i:03d}" for i in range(1, len(parts)+1)]), encoding="utf-8")
          PY
          python3 script_prepare.py
          echo "matrix=$(cat output/meta/matrix.json)" >> "$GITHUB_OUTPUT"

      - name: Textteile als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: text-teile
          path: |
            output/parts/
            output/meta/
          retention-days: 1

  sprachsynthese:
    needs: textaufbereitung
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      VAST_API_KEY: ${{ secrets.VAST_API_KEY }}
    steps:
      - name: Systempakete installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg jq

      - name: Textteile herunterladen
        uses: actions/download-artifact@v4
        with:
          name: text-teile
          path: output

      - name: Vast.ai CLI installieren
        run: |
          pip install --no-cache-dir vastai
          vastai set api-key "$VAST_API_KEY"

      - name: SSH-Key für Instanzzugriff einrichten
        shell: bash
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VAST_SSH_PRIVATE_KEY }}" > ~/.ssh/vastai_key
          chmod 600 ~/.ssh/vastai_key

      - name: Vast.ai-Instanz mieten und XTTS-v2 starten
        id: instanz
        shell: bash
        run: |
          set -e
          OFFER_JSON=$(vastai search offers \
            'reliability>0.97 gpu_name=RTX_3090 rentable=true num_gpus=1' \
            -o 'dph' --raw | jq -c 'sort_by(.dph_total) | .[0]')

          if [ -z "$OFFER_JSON" ] || [ "$OFFER_JSON" = "null" ]; then
            echo "Fehler: Kein passendes Angebot gefunden." >&2
            exit 1
          fi

          OFFER_ID=$(echo "$OFFER_JSON" | jq -r '.id')
          echo "Gewähltes Angebot: $OFFER_ID ($(echo "$OFFER_JSON" | jq -r '.dph_total') USD/Std)"

          CREATE_JSON=$(vastai create instance "$OFFER_ID" \
            --image daswer123/xtts-api-server:latest \
            --disk 30 \
            --ssh \
            --direct \
            --env '-p 8020:8020' \
            --raw)

          INSTANCE_ID=$(echo "$CREATE_JSON" | jq -r '.new_contract')
          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "null" ]; then
            echo "Fehler: Instanz konnte nicht erstellt werden." >&2
            exit 1
          fi
          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"
          echo "Instanz $INSTANCE_ID wird gestartet..."

          for i in $(seq 1 60); do
            STATUS_JSON=$(vastai show instance "$INSTANCE_ID" --raw)
            ACTUAL_STATUS=$(echo "$STATUS_JSON" | jq -r '.actual_status')
            if [ "$ACTUAL_STATUS" = "running" ]; then
              echo "Instanz läuft."
              break
            fi
            echo "Warte auf Instanzstart... ($i/60, Status: $ACTUAL_STATUS)"
            sleep 15
          done

          if [ "$ACTUAL_STATUS" != "running" ]; then
            echo "Fehler: Instanz nach 15 Minuten immer noch nicht bereit." >&2
            exit 1
          fi

          PUBLIC_IP=$(echo "$STATUS_JSON" | jq -r '.public_ipaddr')
          MAPPED_PORT=$(echo "$STATUS_JSON" | jq -r '.ports["8020/tcp"][0].HostPort')
          echo "public_ip=$PUBLIC_IP" >> "$GITHUB_OUTPUT"
          echo "mapped_port=$MAPPED_PORT" >> "$GITHUB_OUTPUT"
          echo "API erreichbar unter: http://$PUBLIC_IP:$MAPPED_PORT"

          echo "Warte auf API-Bereitschaft..."
          for i in $(seq 1 40); do
            if curl -s -o /dev/null -w "%{http_code}" "http://$PUBLIC_IP:$MAPPED_PORT/speakers_list" | grep -q "200"; then
              echo "API ist bereit."
              break
            fi
            echo "API noch nicht bereit... ($i/40)"
            sleep 15
          done

      - name: Alle Textteile per XTTS-v2 vertonen
        shell: bash
        run: |
          cat > script_xtts_synthese.py <<'PY'
          import re, sys, time, json, subprocess
          from pathlib import Path
          import requests

          PUBLIC_IP = "${{ steps.instanz.outputs.public_ip }}"
          MAPPED_PORT = "${{ steps.instanz.outputs.mapped_port }}"
          BASE_URL = f"http://{PUBLIC_IP}:{MAPPED_PORT}"
          SPRACHE = "de"
          SPRECHER = "male_de_1"

          PARTS_DIR = Path("output/parts")
          AUDIO_DIR = Path("output/audio"); AUDIO_DIR.mkdir(parents=True, exist_ok=True)
          META = Path("output/meta")

          teile = sorted(PARTS_DIR.glob("teil_*.txt"))
          if not teile:
              raise SystemExit("Fehler: Keine Textteile gefunden.")

          for teil_pfad in teile:
              teil_nr = teil_pfad.stem.split("_")[1]
              zeilen = [z.strip() for z in teil_pfad.read_text(encoding="utf-8").split("\n") if z.strip()]
              report = [f"Teil {teil_nr}: {len(zeilen)} Zeilen, XTTS-v2 ueber {BASE_URL}"]

              wav_teile = []
              for idx, zeile in enumerate(zeilen, start=1):
                  fehlversuche = 0
                  erfolgreich = False
                  while fehlversuche < 3 and not erfolgreich:
                      try:
                          resp = requests.post(
                              f"{BASE_URL}/tts_to_audio/",
                              json={"text": zeile, "speaker_wav": SPRECHER, "language": SPRACHE},
                              timeout=120,
                          )
                          if resp.status_code == 200 and resp.content:
                              out_wav = AUDIO_DIR / f"tmp_{teil_nr}_{idx:05d}.wav"
                              out_wav.write_bytes(resp.content)
                              wav_teile.append(out_wav)
                              erfolgreich = True
                          else:
                              raise ValueError(f"HTTP {resp.status_code}")
                      except Exception as e:
                          fehlversuche += 1
                          report.append(f"Zeile {idx:05d}: Versuch {fehlversuche} fehlgeschlagen: {e}")
                          time.sleep(5)
                  if not erfolgreich:
                      report.append(f"Zeile {idx:05d}: ALLE VERSUCHE FEHLGESCHLAGEN, uebersprungen -> {zeile[:60]}")
                  else:
                      print(f"[OK] Teil {teil_nr} Zeile {idx}/{len(zeilen)}", flush=True)

              if not wav_teile:
                  raise SystemExit(f"Fehler: Teil {teil_nr} hat keine erfolgreichen Audiozeilen.")

              liste_datei = AUDIO_DIR / f"concat_{teil_nr}.txt"
              liste_datei.write_text(
                  "\n".join(f"file '{p.resolve()}'" for p in wav_teile), encoding="utf-8"
              )
              final_wav = AUDIO_DIR / f"teil_{teil_nr}.wav"
              final_mp3 = AUDIO_DIR / f"teil_{teil_nr}.mp3"
              subprocess.run(
                  ["ffmpeg", "-y", "-f", "concat", "-safe", "0", "-i", str(liste_datei), "-c", "copy", str(final_wav)],
                  capture_output=True
              )
              subprocess.run(
                  ["ffmpeg", "-y", "-i", str(final_wav), "-codec:a", "libmp3lame", "-qscale:a", "2", str(final_mp3)],
                  capture_output=True
              )
              for p in wav_teile: p.unlink(missing_ok=True)
              final_wav.unlink(missing_ok=True)
              liste_datei.unlink(missing_ok=True)

              report.append(f"Erfolgreiche Zeilen: {len(wav_teile)} / {len(zeilen)}")
              (META / f"qualitaet_teil_{teil_nr}.txt").write_text("\n".join(report) + "\n", encoding="utf-8")
              print(f"[FERTIG] Teil {teil_nr} abgeschlossen.", flush=True)
          PY
          pip install --no-cache-dir requests
          python3 -u script_xtts_synthese.py

      - name: Vast.ai-Instanz zerstören
        if: always()
        shell: bash
        run: |
          if [ -n "${{ steps.instanz.outputs.instance_id }}" ]; then
            echo "Zerstöre Instanz ${{ steps.instanz.outputs.instance_id }}..."
            vastai destroy instance "${{ steps.instanz.outputs.instance_id }}" || true
          fi

      - name: Audio-Teile als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: audio-teile
          path: output/audio/teil_*.mp3
          retention-days: 1

      - name: Qualitätsberichte als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: qualitaet-berichte
          path: output/meta/qualitaet_teil_*.txt
          retention-days: 7

  zusammenfuegen:
    needs: sprachsynthese
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Systempakete installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Alle Audio-Teile herunterladen
        uses: actions/download-artifact@v4
        with:
          name: audio-teile
          path: output/audio

      - name: Alle Qualitätsberichte herunterladen
        uses: actions/download-artifact@v4
        with:
          name: qualitaet-berichte
          path: output/meta

      - name: Textmeta herunterladen
        uses: actions/download-artifact@v4
        with:
          name: text-teile
          path: output

      - name: Gesamtbericht in einer Datei zusammenfassen
        shell: bash
        run: |
          mkdir -p release
          {
            echo "===== HOERBUCH BERICHT - Lauf ${{ github.run_id }} ====="
            echo
            echo "--- 1. Textextraktion ---"
            cat output/meta/01_extraktion.txt 2>/dev/null || echo "(kein Bericht vorhanden)"
            echo
            echo "--- 2. Sprachliche Glaettung (spaCy) ---"
            cat output/meta/02_glaettung.txt 2>/dev/null || echo "(kein Bericht vorhanden)"
            echo
            echo "--- 3. Haertung fuer XTTS-v2 ---"
            cat output/meta/03_haertung.txt 2>/dev/null || echo "(kein Bericht vorhanden)"
            echo
            echo "--- 4. Aufteilung in Teile ---"
            cat output/meta/04_aufteilung.txt 2>/dev/null || echo "(kein Bericht vorhanden)"
            echo
            echo "--- 5. Sprachsynthese (XTTS-v2 auf Vast.ai): Qualitaet je Teil ---"
            for f in $(ls output/meta/qualitaet_teil_*.txt 2>/dev/null | sort); do
              echo ">>> $(basename "$f")"
              cat "$f"
              echo
            done
          } > release/bericht_gesamt.txt

      - name: Gesamt-MP3 erzeugen
        shell: bash
        run: |
          ls output/audio/teil_*.mp3 | sort > output/meta/mp3_list_raw.txt
          BASE="$(pwd)"
          awk -v base="$BASE" '{print "file '\''" base "/" $0 "'\''"}' output/meta/mp3_list_raw.txt > output/meta/concat.txt
          ffmpeg -y -f concat -safe 0 -i output/meta/concat.txt \
            -metadata comment="Erstellt von Melvin-Udall - H-rb-cher Projekt" \
            -metadata artist="Melvin-Udall" \
            -c copy output/hoerbuch_gesamt.mp3

      - name: Dateien für Release vorbereiten
        shell: bash
        run: |
          cp output/hoerbuch_gesamt.mp3 "release/00_hoerbuch_gesamt.mp3"
          i=1
          for f in $(ls output/audio/teil_*.mp3 | sort); do
            printf -v nr "%03d" "$i"
            cp "$f" "release/${nr}_$(basename "$f")"
            i=$((i+1))
          done

      - name: Release veröffentlichen
        uses: softprops/action-gh-release@v2
        with:
          tag_name: hoerbuch-${{ github.run_id }}
          name: Hörbuch ${{ github.run_id }}
          files: |
            release/*
          body: |
            Automatisch erstelltes Hörbuch (Glättung: spaCy, Sprachsynthese: XTTS-v2 auf Vast.ai-GPU).
            Enthalten: Gesamt-MP3, Einzelteile als MP3, und EINE zusammengefasste
            Berichtsdatei (bericht_gesamt.txt) mit allen Verarbeitungsschritten
            und der Qualitätsprüfung jeder Zeile.

      - name: E-Mail mit Download-Link senden
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_PASSWORD }}
          subject: Hörbuch fertig - Run ${{ github.run_id }}
          to: ${{ secrets.RECIPIENT_EMAIL }}
          from: Hörbuch-Bot
          body: |
            Dein Hörbuch ist fertig.
            Download:
            https://github.com/Melvin-Udall/H-rb-cher/releases/tag/hoerbuch-${{ github.run_id }}
            Enthalten: eine Gesamt-MP3, mehrere Teil-MP3s und EINE Berichtsdatei
            (bericht_gesamt.txt) mit allen Informationen zu Extraktion, Glättung (spaCy),
            Härtung, Aufteilung und Qualitätsprüfung (Synthese via XTTS-v2 auf Vast.ai).
